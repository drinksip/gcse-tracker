<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDVr3v8NK2U0kueAsJ_WcDcLyFUNk7k2T0",
    authDomain: "gcse-tracker-4dd48.firebaseapp.com",
    projectId: "gcse-tracker-4dd48",
    storageBucket: "gcse-tracker-4dd48.firebasestorage.app",
    messagingSenderId: "570623522939",
    appId: "1:570623522939:web:5ac79d309dbe77df5ecade"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  window.__firebase = {
    async register(username, password) {
      const email = username.trim().toLowerCase() + "@gcsetracker.app";
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, "users", cred.user.uid), { username: username.trim().toLowerCase(), timetable:{}, spec:{}, grades:{}, tests:[], groqKey:"", openrouterKey:"", hfKey:"", aiProvider:"groq", specRequests:[], chats:[], revisionLog:[] });
      return { uid: cred.user.uid, username: username.trim().toLowerCase() };
    },
    async login(username, password) {
      const email = username.trim().toLowerCase() + "@gcsetracker.app";
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const snap = await getDoc(doc(db, "users", cred.user.uid));
      return { uid: cred.user.uid, username: username.trim().toLowerCase(), data: snap.exists() ? snap.data() : {} };
    },
    async logout() { await signOut(auth); },
    async saveData(uid, data) { await setDoc(doc(db, "users", uid), data, { merge: true }); },
    async loadDoc(uid) { const snap = await getDoc(doc(db, "users", uid)); return snap.exists() ? snap.data() : null; },
    async sendSpecRequest(username, subjectId, subjectName, examBoard) {
      await addDoc(collection(db, "spec_requests"), { username, subjectId, subjectName, examBoard, timestamp: new Date().toISOString() });
    },
    onAuthChange(cb) { return onAuthStateChanged(auth, cb); }
  };

  window.dispatchEvent(new Event("firebaseReady"));
</script>

// ─── SHARED AI HELPER (Groq / OpenRouter) ──────────────────────────────────────
async function callAI(aiConfig, prompt, systemPrompt){
  systemPrompt = systemPrompt || "You are a helpful GCSE revision assistant.";
  const {provider, key} = aiConfig;

  if(provider === "openrouter"){
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key,"HTTP-Referer":"https://gcsetracker.app","X-Title":"GCSE Revision Tracker"},
      body:JSON.stringify({
        model:"openai/gpt-oss-120b:free",
        messages:[{role:"system",content:systemPrompt},{role:"user",content:prompt}],
        max_tokens:1200, temperature:0.7
      })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);
    return (data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content) || "No response received.";
  }

  if(provider === "huggingface"){
    const res = await fetch("https://api-inference.huggingface.co/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({
        model:"meta-llama/Llama-3.3-70B-Instruct",
        messages:[{role:"system",content:systemPrompt},{role:"user",content:prompt}],
        max_tokens:1200, temperature:0.7
      })
    });
    const data = await res.json();
    if(data.error) throw new Error(typeof data.error==="string"?data.error:data.error.message||"Hugging Face error");
    return (data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content) || "No response received.";
  }

  // Default: Groq
  const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
    body:JSON.stringify({
      model:"llama-3.3-70b-versatile",
      messages:[{role:"system",content:systemPrompt},{role:"user",content:prompt}],
      max_tokens:1200, temperature:0.7
    })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return (data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content) || "No response received.";
}

function LoginScreen({onLogin}){
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);
  const [fbReady,setFbReady]=useState(!!window.__firebase);

  useEffect(()=>{
    if(!window.__firebase){
      const h=()=>setFbReady(true);
      window.addEventListener("firebaseReady",h);
      return()=>window.removeEventListener("firebaseReady",h);
    }
  },[]);

  const friendly=(code)=>{
    if(code==="auth/user-not-found"||code==="auth/invalid-credential")return"Username or password is incorrect.";
    if(code==="auth/wrong-password")return"Wrong password.";
    if(code==="auth/email-already-in-use")return"That username is already taken.";
    if(code==="auth/weak-password")return"Password must be at least 6 characters.";
    if(code==="auth/too-many-requests")return"Too many attempts. Please wait a moment.";
    return"Something went wrong. Please try again.";
  };

  const handle=async(isRegister)=>{
    if(!username.trim()||!password.trim()){setError("Please enter a username and password.");return;}
    if(!fbReady){setError("Still connecting, please wait...");return;}
    setLoading(true);setError("");
    try{
      if(isRegister){const res=await window.__firebase.register(username,password);onLogin(res.uid,res.username,{});}
      else{const res=await window.__firebase.login(username,password);onLogin(res.uid,res.username,res.data);}
    }catch(e){setError(friendly(e.code));}
    setLoading(false);
  };

  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
    <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:16,padding:"40px 36px",width:"100%",maxWidth:380}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:40,marginBottom:10}}>📋</div>
        <div style={{fontSize:20,fontWeight:700,color:"var(--text)",fontFamily:"var(--mono)"}}>GCSE Revision Tracker</div>
        <div style={{fontSize:11,color:"var(--text3)",marginTop:4,letterSpacing:2,textTransform:"uppercase",fontFamily:"var(--mono)"}}>Sign in or create an account</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div>
          <div style={{fontSize:11,color:"var(--text3)",marginBottom:5,fontFamily:"var(--mono)",textTransform:"uppercase",letterSpacing:1}}>Username</div>
          <input value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle(false)} placeholder="e.g. bob123" style={S.input} autoComplete="username"/>
        </div>
        <div>
          <div style={{fontSize:11,color:"var(--text3)",marginBottom:5,fontFamily:"var(--mono)",textTransform:"uppercase",letterSpacing:1}}>Password</div>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle(false)} placeholder="at least 6 characters" style={S.input} autoComplete="current-password"/>
        </div>
        {error&&<div style={{fontSize:12,color:"var(--red)",background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:7,padding:"8px 12px",fontFamily:"var(--mono)"}}>{error}</div>}
        <button onClick={()=>handle(false)} disabled={loading} style={{...S.btnBlue,opacity:loading?0.6:1,marginTop:4}}>{loading?"Loading...":"Log In"}</button>
        <button onClick={()=>handle(true)} disabled={loading} style={{background:"transparent",border:"1px solid #334155",borderRadius:8,color:"var(--text2)",padding:"11px",fontSize:14,fontFamily:"inherit",cursor:"pointer",opacity:loading?0.6:1}}>Register new account</button>
      </div>
      <div style={{fontSize:10,color:"var(--text3)",textAlign:"center",marginTop:20,fontFamily:"var(--mono)",lineHeight:1.6}}>Passwords cannot be reset or viewed by anyone — choose one you can remember.</div>
    </div>
  </div>;
}

function Timetable({timetable,setTimetable,tests,setTests,groqKey,openrouterKey,hfKey,aiProvider,getProgress,subtopicData,setShowSettings}){
  const [showSel,setShowSel]=useState(false);
  const [showAI,setShowAI]=useState(false);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiResult,setAiResult]=useState("");
  const [applyPreview,setApplyPreview]=useState(null);
  const [aiQ,setAiQ]=useState({hours:"2",priority:"",goal:"",useRag:false});
  const [newTest,setNewTest]=useState({subject:"",date:"",type:"Class test"});
  const [showAddTest,setShowAddTest]=useState(false);

  const setSlot=(day,slot,vals)=>setTimetable(p=>({...p,[`${day}__${slot}`]:vals}));
  const getSlot=(day,slot)=>{const v=timetable[`${day}__${slot}`];if(!v)return[];if(Array.isArray(v))return v;return v?[v]:[];};
  const counts={};
  Object.values(timetable).forEach(v=>{const arr=Array.isArray(v)?v:(v?[v]:[]);arr.forEach(id=>{if(id)counts[id]=(counts[id]||0)+1;});});

  const assignedSubjectIds=[...new Set(Object.values(counts).length>0?Object.keys(counts):[])];

  // Sort upcoming tests
  const today=new Date();today.setHours(0,0,0,0);
  const upcomingTests=(tests||[]).filter(t=>new Date(t.date)>=today).sort((a,b)=>new Date(a.date)-new Date(b.date));

  const daysUntil=(dateStr)=>{
    const d=new Date(dateStr);d.setHours(0,0,0,0);
    return Math.round((d-today)/(1000*60*60*24));
  };

  const addTest=()=>{
    if(!newTest.subject||!newTest.date)return;
    setTests(p=>[...(p||[]),{...newTest,id:Date.now().toString()}]);
    setNewTest({subject:"",date:"",type:"Class test"});
    setShowAddTest(false);
  };
  const removeTest=(id)=>setTests(p=>(p||[]).filter(t=>t.id!==id));

  // Parse AI timetable text into structured timetable object
  const parseAITimetable=(text)=>{
    const result={};
    const dayAliases={mon:"Mon",tue:"Tue",wed:"Wed",thu:"Thu",fri:"Fri",sat:"Sat"};
    const slotAliases={"daily habit":"Daily habit / short task","short task":"Daily habit / short task","slot 1":"Slot 1","slot 2":"Slot 2","evening 1":"Slot 1","evening 2":"Slot 2"};
    const lines=text.split("\n");
    let curDay=null;
    for(const line of lines){
      const ll=line.toLowerCase();
      for(const[k,v] of Object.entries(dayAliases)){if(ll.startsWith(k)||ll.includes(" "+k+" ")||ll.includes("\n"+k)){curDay=v;break;}}
      if(!curDay)continue;
      for(const[k,v] of Object.entries(slotAliases)){
        if(ll.includes(k)){
          const found=ALL_SUBJECTS.filter(s=>ll.includes(s.name.toLowerCase())||ll.includes(s.id.toLowerCase())).map(s=>s.id);
          if(found.length>0) result[curDay+"__"+v]=found;
          break;
        }
      }
    }
    return Object.keys(result).length>0?result:null;
  };

  const runAI=async()=>{
    const activeKey=aiProvider==="openrouter"?openrouterKey:aiProvider==="huggingface"?hfKey:groqKey;
    const aiConfig={provider:aiProvider||"groq",key:activeKey};
    if(!activeKey){setAiResult("No AI key set. Go to AI Setup to add one.");return;}
    if(assignedSubjectIds.length===0){setAiResult("Please add subjects to your timetable first before optimizing.");return;}
    setAiLoading(true);setAiResult("");setApplyPreview(null);
    
    const assignedSubjectNames=assignedSubjectIds.map(id=>ALL_SUBJECTS.find(x=>x.id===id)?.name).filter(Boolean).join(", ");
    
    let ragSummary="";
    if(aiQ.useRag){
      ragSummary=assignedSubjectIds.map(id=>{
        const s=ALL_SUBJECTS.find(x=>x.id===id);
        const subjectWithSpec=SUBJECTS.find(x=>x.id===id);
        if(!subjectWithSpec)return(s?s.name:id)+": no spec data";
        let total=0,green=0,amber=0,red=0;
        subjectWithSpec.topics.forEach(t=>t.subtopics.forEach((_,i)=>{
          total++;
          const key=id+"__"+t.id+"__"+i;
          const v=subtopicData[key]||{rag:"None"};
          if(v.rag==="Green")green++;else if(v.rag==="Amber")amber++;else if(v.rag==="Red")red++;
        }));
        return(s?s.name:id)+": "+green+"/"+total+" green, "+amber+" amber, "+red+" red";
      }).join("\n");
    }
    
    const testsList=upcomingTests.map(t=>t.subject+" - "+t.type+" in "+daysUntil(t.date)+" days").join("\n")||"No upcoming tests";
    const ragSection=aiQ.useRag?"\n\nSpec coverage (RAG):\n"+ragSummary:"";
    const prompt="A student needs an optimised weekly revision timetable.\n\nStudent's subjects: "+assignedSubjectNames+ragSection+"\n\nUpcoming tests:\n"+testsList+"\n\nInfo:\n- Study hours per day: "+aiQ.hours+"\n- Priority: "+(aiQ.priority||"none")+"\n- Goal: "+(aiQ.goal||"general revision")+"\n\nDays: Mon-Sat. Sessions per day: Daily habit / short task, Slot 1, Slot 2.\n\n⚠️ CRITICAL: ONLY use these subjects in the timetable: "+assignedSubjectNames+"\n\nFormat EXACTLY like this so it can be auto-applied:\nMon - Daily habit / short task: [Subject]\nMon - Slot 1: [Subject]\nMon - Slot 2: [Subject]\nTue - Daily habit / short task: [Subject]\n...and so on for all 6 days.\n\nAfter the timetable block, briefly explain your choices.";
    try{
      const result=await callAI(aiConfig,prompt,"You are a GCSE revision assistant. ONLY use the subjects provided. Follow the exact format requested for the timetable. Give practical, accurate advice. Never suggest subjects not in the student's list.");
      setAiResult(result);
      const parsed=parseAITimetable(result);
      if(parsed)setApplyPreview(parsed);
    }catch(e){setAiResult("Failed to connect to AI provider. Check your API key in AI Setup.");}
    setAiLoading(false);
  };


  return <div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
      <div style={S.sectionHeader}>Weekly Study Planner</div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setTimetable({})} style={S.btn}>🔄 Clear timetable</button>
        <button onClick={()=>setShowSel(p=>!p)} style={S.btn}>{showSel?"🙈 Hide selectors":"✏️ Edit timetable"}</button>
      </div>
    </div>
    <p style={{color:"var(--text3)",fontSize:12,marginBottom:16,marginTop:4}}>Mon-Sat · Hold Ctrl (or Cmd on Mac) to select multiple subjects per cell.</p>

    {/* Timetable grid */}
    <div style={{marginBottom:20,overflowX:"auto"}}>
      <table style={S.table}><thead><tr>
        <th style={S.th}>Day</th>
        {SLOTS.map(slot=><th key={slot} style={S.th}>{slot}</th>)}
      </tr></thead><tbody>
        {DAYS.map(day=><tr key={day}>
          <td style={S.tdLabel}>{day}</td>
          {SLOTS.map(slot=>{
            const vals=getSlot(day,slot);
            const borderCol=vals.length===1?getActualColor(ALL_SUBJECTS.find(s=>s.id===vals[0])?.color||"#94a3b8"):vals.length>1?"#94a3b8":"var(--border)";
            return <td key={slot} style={{...S.td,verticalAlign:"top"}}>
              {showSel&&<select multiple value={vals} onChange={e=>{const sel=Array.from(e.target.selectedOptions).map(o=>o.value);setSlot(day,slot,sel);}}

// ─── AI COACH ──────────────────────────────────────────────────────────────────
function genId(){return"c"+Date.now()+"_"+Math.random().toString(36).substr(2,9);}
function AICoach({groqKey,openrouterKey,hfKey,aiProvider,subtopicData,tests,chats,setChats}){
  const [activeChatId,setActiveChatId]=useState(null);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  const activeChat=chats&&chats.find(c=>c.id===activeChatId);
  const messages=activeChat?.messages||[];

  useEffect(()=>{
    endRef.current?.scrollIntoView({behavior:"smooth"});
  },[messages]);

  const createChat=()=>setActiveChatId(null);

  const deleteChat=(id)=>{
    setChats(prev=>{
      const updated=(prev||[]).filter(c=>c.id!==id);
      const remaining=updated;
      setActiveChatId(remaining.length>0?remaining[remaining.length-1].id:null);
      return updated;
    });
  };

  const updateChat=(id,fn)=>setChats(p=>(p||[]).map(c=>c.id===id?Object.assign({},c,fn(c)):c));

  const buildContext=()=>{
    const ragSummary=SUBJECTS.map(s=>{
      let total=0,green=0,amber=0,red=0;
      s.topics.forEach(t=>t.subtopics.forEach((_,i)=>{
        total++;const v=subtopicData[s.id+"__"+t.id+"__"+i]||{rag:"None"};
        if(v.rag==="Green")green++;else if(v.rag==="Amber")amber++;else if(v.rag==="Red")red++;
      }));
      return s.name+" ("+s.board+"): "+green+"/"+total+" green, "+amber+" amber, "+red+" red";
    }).join("\n");
    const today=new Date();today.setHours(0,0,0,0);
    const testsList=(tests||[]).filter(t=>new Date(t.date)>=today).sort((a,b)=>new Date(a.date)-new Date(b.date))
      .map(t=>{const days=Math.round((new Date(t.date)-today)/(1000*60*60*24));return t.subject+" "+t.type+" in "+days+" days";}).join(", ")||"none";
    return"Student RAG data:\n"+ragSummary+"\n\nUpcoming tests: "+testsList;
  };

  const send=async()=>{
    if(!input.trim())return;
    if(!activeChatId){
      const id=genId();
      const userMsg=input.trim();
      setInput("");
      const welcome={role:"assistant",text:"Hi! I'm your AI study coach. Ask me anything — revision tips, topic explanations, exam technique, or anything GCSE-related. I can see your RAG data to give personalised advice."};
      const userMsgObj={role:"user",text:userMsg};
      const newChat={id,name:userMsg.slice(0,32)+(userMsg.length>32?"...":""),messages:[welcome,userMsgObj]};
      setChats(p=>[...(p||[]),newChat]);
      setActiveChatId(id);
      const activeKey3=aiProvider==="openrouter"?openrouterKey:aiProvider==="huggingface"?hfKey:groqKey;
      const aiConfig3={provider:aiProvider||"groq",key:activeKey3};
      if(!activeKey3){
        setChats(p=>(p||[]).map(c=>c.id===id?{...c,messages:[...c.messages,{role:"assistant",text:"No AI key set. Go to AI Setup to add one."}]}:c));
        return;
      }
      setLoading(true);
      const ctx=buildContext();
      const prompt=ctx+"\n\nStudent: "+userMsg;
      try{
        const reply=await callAI(aiConfig3,prompt,"You are a friendly, encouraging GCSE revision coach. Keep responses concise and accurate. This is for real exam-prep — ensure factual correctness.");
        setChats(p=>(p||[]).map(c=>c.id===id?{...c,messages:[...c.messages,{role:"assistant",text:reply}]}:c));
      }catch(e){
        setChats(p=>(p||[]).map(c=>c.id===id?{...c,messages:[...c.messages,{role:"assistant",text:"Failed to connect to AI provider. Check your API key in AI Setup."}]}:c));
      }
      setLoading(false);
      return;
    }
    const activeKey5=aiProvider==="openrouter"?openrouterKey:aiProvider==="huggingface"?hfKey:groqKey;
    const aiConfig5={provider:aiProvider||"groq",key:activeKey5};
    if(!activeKey5){
      updateChat(activeChatId,c=>({messages:[...c.messages,{role:"user",text:input},{role:"assistant",text:"No AI key set. Go to AI Setup to add one."}]}));
      setInput("");return;
    }
    const userMsg=input.trim();
    setInput("");
    updateChat(activeChatId,c=>({messages:[...c.messages,{role:"user",text:userMsg}]}));
    setLoading(true);
    const ctx=buildContext();
    const history=messages.map(m=>(m.role==="user"?"Student":"Coach")+": "+m.text).join("\n");
    const prompt=ctx+"\n\nConversation so far:\n"+history+"\nStudent: "+userMsg;
    try{
      const reply=await callAI(aiConfig5,prompt,"You are a friendly, encouraging GCSE revision coach. Keep responses concise and accurate. This is for real exam-prep — ensure factual correctness.");
      updateChat(activeChatId,c=>{
        const nm=[...c.messages,{role:"assistant",text:reply}];
        const name=c.name==="New chat"?userMsg.slice(0,32)+(userMsg.length>32?"...":""):c.name;
        return{messages:nm,name};
      });
    }catch(e){
      updateChat(activeChatId,c=>({messages:[...c.messages,{role:"assistant",text:"Failed to connect to AI provider. Check your API key in AI Setup."}]}));
    }
    setLoading(false);
  };

  const sidebarStyle={width:200,borderRight:"1px solid #1e293b",display:"flex",flexDirection:"column",background:"var(--bg)",flexShrink:0};

  return <div>
    <div style={S.sectionHeader}>🤖 AI Study Coach</div>
    <p style={{color:"var(--text3)",fontSize:12,marginBottom:16,marginTop:4}}>
      Ask me anything about your revision. Chats are saved automatically.
      {!(aiProvider==="openrouter"?openrouterKey:aiProvider==="huggingface"?hfKey:groqKey)&&<span style={{color:"var(--red)"}}> (Add an AI key in AI Setup to use this)</span>}
    </p>
    <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,display:"flex",height:500,overflow:"hidden"}}>
      <div style={sidebarStyle}>
        <div style={{padding:"10px 14px",fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,borderBottom:"1px solid #1e293b",display:"flex",justifyContent:"space-between",alignItems:"center",fontFamily:"var(--mono)"}}>
          <span>Chats</span>
          <button onClick={createChat} style={{...S.btn,padding:"2px 8px",fontSize:11}}>＋</button>
        </div>
        <div style={{flex:1,overflowY:"auto"}}>
          {(!chats||chats.length===0)&&<div style={{padding:"12px 14px",fontSize:11,color:"var(--text3)"}}>No chats yet</div>}
          {(chats||[]).map(c=><div key={c.id} onClick={()=>setActiveChatId(c.id)}
            style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid var(--border)",background:activeChatId===c.id?"rgba(79,130,255,0.1)":"transparent",borderLeft:activeChatId===c.id?"2px solid #60a5fa":"2px solid transparent",transition:"background 0.12s"}}>
            <div style={{fontSize:12,fontWeight:500,color:"var(--text2)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div>
            <div style={{fontSize:10,color:"var(--text3)",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.messages&&c.messages.length>0&&c.messages[c.messages.length-1]?.text?c.messages[c.messages.length-1].text.slice(0,40):""}</div>
          </div>)}
        </div>
        {activeChatId&&<button onClick={()=>deleteChat(activeChatId)} style={{...S.btn,margin:8,fontSize:11,color:"var(--red)",borderColor:"rgba(248,113,113,0.2)"}}>🗑 Delete chat</button>}
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        {!activeChatId
          ?<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{textAlign:"center",marginBottom:24}}>
              <div style={{fontSize:48,marginBottom:12}}>🤖</div>
              <div style={{color:"var(--text3)",fontSize:14,marginBottom:8}}>No chat selected</div>
              <div style={{color:"var(--text3)",fontSize:12}}>Start typing to create a new chat</div>
            </div>
            <div style={{width:"100%",borderTop:"1px solid #1e293b",padding:12,display:"flex",gap:8,background:"var(--bg2)",marginTop:"auto"}}>
              <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!loading&&send()}
                placeholder="Ask anything about your revision..." style={{...S.input,fontSize:12,flex:1}}/>
              <button onClick={send} disabled={loading||!input.trim()} style={{...S.btnBlue,padding:"8px 16px",opacity:(loading||!input.trim())?0.5:1}}>Send</button>
            </div>
          </div>
          :<div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0}}>
            <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:10}}>
              {messages.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"80%",background:m.role==="user"?"#1d4ed8":"var(--bg3)",borderRadius:10,padding:"10px 14px",fontSize:13,color:"var(--text)",lineHeight:1.6,whiteSpace:"pre-wrap",border:m.role==="user"?"none":"1px solid #1e293b"}}>
                  {m.text}
                </div>
              </div>)}
              {loading&&<div style={{display:"flex"}}><div style={{background:"var(--bg3)",borderRadius:10,padding:"10px 14px",fontSize:13,color:"var(--text3)",border:"1px solid var(--border)"}}>Thinking...</div></div>}
              <div ref={endRef}/>
            </div>
            <div style={{borderTop:"1px solid #1e293b",padding:12,display:"flex",gap:8,background:"var(--bg2)",flexShrink:0}}>
              <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!loading&&send()}
                placeholder="Ask anything about your revision..." style={{...S.input,fontSize:12,flex:1}}/>
              <button onClick={send} disabled={loading||!input.trim()} style={{...S.btnBlue,padding:"8px 16px",opacity:(loading||!input.trim())?0.5:1}}>Send</button>
            </div>
          </div>
        }
      </div>
    </div>
  </div>;
}


// ─── GRADE CARD (standalone to avoid remount issues) ────────────────────────
function GradeCard({s,showProgress,getGrade,setGrade,getProgress}){
    const g=getGrade(s.id);
    const prog=showProgress?getProgress(s.id):null;
    const gPct=prog?Math.round((prog.green/prog.total)*100):0;
    const aPct=prog?Math.round((prog.amber/prog.total)*100):0;
    const actualColor=getActualColor(s.color);
    return <div style={{...S.card,borderLeft:`3px solid ${actualColor}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>{s.emoji}</span>
          <div>
            <div style={{fontWeight:700,color:"var(--text)",fontSize:15}}>{s.name}</div>
            <div style={{color:"var(--text3)",fontSize:12}}>{s.board||"—"}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {["target","mock","predicted"].map(field=><div key={field} style={{textAlign:"center"}}>
            <div style={{color:"var(--text3)",fontSize:11,marginBottom:3,textTransform:"uppercase",letterSpacing:1}}>{field}</div>
            <select value={g[field]} onChange={e=>setGrade(s.id,field,e.target.value)} style={{...S.gradeSel,color:actualColor}}>
              <option value="">-</option>
              {["U","1","2","3","4","5","6","7","8","9"].map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>)}
        </div>
      </div>
      {showProgress&&prog&&<div style={{marginTop:14}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{color:"var(--text2)",fontSize:12}}>Spec coverage (RAG)</span>
          <span style={{color:"var(--text2)",fontSize:12}}>{prog.green}/{prog.total} green</span>
        </div>
        <div style={S.progressTrack}>
          <div style={{...S.progressBar,width:`${gPct}%`,background:"#4ade80"}}/>
          <div style={{...S.progressBar,width:`${aPct}%`,background:"#fbbf24"}}/>
        </div>
        <div style={{display:"flex",gap:12,marginTop:5}}>
          {[["🟢",prog.green,"#4ade80"],["🟡",prog.amber,"#fbbf24"],["🔴",prog.red,"#f87171"]].map(([icon,n,c])=><span key={icon} style={{fontSize:11,color:c}}>{icon} {n}</span>)}
        </div>
      </div>}
      <textarea placeholder="Notes..." value={g.notes} onChange={e=>setGrade(s.id,"notes",e.target.value)} style={S.notesArea} rows={2}/>
    </div>;
}


// ─── GRADES ───────────────────────────────────────────────────────────────────
function Grades({grades,setGrades,getProgress,assignedSubjectIds}){
  const setGrade=(id,field,val)=>setGrades(p=>({...p,[id]:{...(p[id]||{}),[field]:val}}));
  const getGrade=id=>grades[id]||{target:"",mock:"",predicted:"",notes:""};

  const visibleSubjects=ALL_SUBJECTS.filter(s=>assignedSubjectIds.includes(s.id));
  const subjectsWithSpec=visibleSubjects.filter(s=>SUBJECTS.find(x=>x.id===s.id));
  const subjectsWithoutSpec=visibleSubjects.filter(s=>!SUBJECTS.find(x=>x.id===s.id));


  return <div>
    <div style={S.sectionHeader}>Grade Tracker</div>
    <p style={{color:"var(--text3)",fontSize:12,marginBottom:20,marginTop:4}}>Only subjects assigned in your timetable appear here.</p>
    {visibleSubjects.length===0&&<div style={{...S.card,color:"var(--text3)",fontSize:13}}>No subjects assigned yet — go to the Timetable tab and add subjects to your sessions.</div>}
    {subjectsWithSpec.length>0&&<div style={{display:"grid",gap:16,marginBottom:16}}>
      {subjectsWithSpec.map(s=><GradeCard key={s.id} s={s} showProgress={true} getGrade={getGrade} setGrade={setGrade} getProgress={getProgress}/>)}
    </div>}
    {subjectsWithoutSpec.length>0&&<div>
      <div style={{fontSize:12,color:"var(--text3)",marginBottom:12,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Subjects without spec data</div>
      <div style={{display:"grid",gap:16}}>
        {subjectsWithoutSpec.map(s=><GradeCard key={s.id} s={s} showProgress={false} getGrade={getGrade} setGrade={setGrade} getProgress={getProgress}/>)}
      </div>
    </div>}
  </div>;
}

// ─── SPEC TRACKER ─────────────────────────────────────────────────────────────
function SpecTracker({expSubj,setExpSubj,expTopic,setExpTopic,getVal,setVal,getProgress,assignedSubjectIds,user,specRequests,setSpecRequests,aiConfig}){
  const toggleTopic=id=>setExpTopic(p=>({...p,[id]:!p[id]}));
  const [reqBoard,setReqBoard]=useState({});
  const [gizmoToast,setGizmoToast]=useState(false);
  const gizmoSearch=(q)=>{
    try{navigator.clipboard.writeText(q);}catch(e){}
    setGizmoToast(q);
    setTimeout(()=>{window.open("https://app.gizmo.ai/decks/public","_blank");setGizmoToast(false);},2200);
  };
  const [confirming,setConfirming]=useState(null);
  const [reqLoading,setReqLoading]=useState(false);
  const [gizmoModal,setGizmoModal]=useState(null);
  const [gizmoLoading,setGizmoLoading]=useState(false);
  const [gizmoText,setGizmoText]=useState("");
  const [gizmoCopied,setGizmoCopied]=useState(false);

  const handleGizmoNotes=async(subj,topic,subtopic,rag)=>{
    const activeKey=aiConfig?.key;
    if(!activeKey){setGizmoModal({subj,topic,subtopic,rag});setGizmoText("No AI key set — go to the menu and open AI Setup.");return;}
    setGizmoModal({subj,topic,subtopic,rag});
    setGizmoLoading(true);setGizmoText("");
    const prompt="Generate detailed GCSE revision notes for: "+subj.name+" ("+subj.board+") — "+topic.name+" — "+subtopic+". Generate 10-15 bullet points covering key facts, definitions, formulas, and exam tips a student needs to know. Each bullet should be a complete, standalone fact. Format as: - [point]. Be factual, concise, exam-focused. UK curriculum.";
    try{
      const reply=await callAI(aiConfig,prompt,"You are a GCSE revision assistant. Generate concise, accurate bullet-point notes for flashcard creation. Be factual and exam-focused. Use UK English.");
      setGizmoText(reply);
    }catch(e){setGizmoText("Failed to generate notes. Check your AI key in the menu.");}
    setGizmoLoading(false);
  };

  const copyGizmo=()=>{
    if(!gizmoText)return;
    navigator.clipboard.writeText(gizmoText).then(()=>{setGizmoCopied(true);setTimeout(()=>setGizmoCopied(false),2000);});
  };

  const visibleSubjects=ALL_SUBJECTS.filter(s=>assignedSubjectIds.includes(s.id));
  const subjectsWithSpec=visibleSubjects.filter(s=>SUBJECTS.find(x=>x.id===s.id));
  const subjectsWithoutSpec=visibleSubjects.filter(s=>!SUBJECTS.find(x=>x.id===s.id));

  const alreadySent=(sId)=>(specRequests||[]).includes(sId);

  const sendRequest=async()=>{
    const s=confirming;if(!s)return;
    setReqLoading(true);
    try{
      await window.__firebase.sendSpecRequest(user.username,s.id,s.name,reqBoard[s.id]);
      setSpecRequests(p=>[...(p||[]),s.id]);
    }catch(e){console.error(e);}
    setReqLoading(false);setConfirming(null);
  };

  return <div>
    {gizmoToast&&<div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:"#1a2540",border:"1px solid rgba(124,58,237,0.4)",borderRadius:12,padding:"14px 22px",zIndex:500,boxShadow:"0 8px 32px rgba(0,0,0,0.4)",textAlign:"center",minWidth:300,maxWidth:420}}>
      <div style={{fontSize:16,marginBottom:6}}>🃏</div>
      <div style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:4}}>Redirecting to Gizmo...</div>
      <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.6}}>Search term copied to clipboard.<br/>Just paste it into the Gizmo search bar.</div>
      <div style={{fontSize:10,color:"#a78bfa",marginTop:8,fontFamily:"var(--mono)",background:"rgba(124,58,237,0.1)",borderRadius:6,padding:"4px 10px",display:"inline-block"}}>"{gizmoToast}"</div>
    </div>}
    {gizmoModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:16,padding:28,width:"100%",maxWidth:540,maxHeight:"85vh",display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>✦ AI Notes for Gizmo</div>
          <button onClick={()=>{setGizmoModal(null);setGizmoText("");}} style={{...S.btn,padding:"4px 10px"}}>✕</button>
        </div>
        <div style={{fontSize:11,color:"var(--text3)",marginBottom:14}}>{gizmoModal.subj?.name} · {gizmoModal.topic?.name} · <span style={{color:gizmoModal.rag==="Red"?"#f87171":"#fbbf24"}}>{gizmoModal.rag}</span></div>
        <div style={{flex:1,overflowY:"auto",background:"var(--bg4)",borderRadius:8,padding:14,marginBottom:14,minHeight:120,fontFamily:"var(--mono)",fontSize:12,color:"var(--text2)",lineHeight:1.7,whiteSpace:"pre-wrap"}}>
          {gizmoLoading?<span style={{color:"var(--text3)"}}>Generating notes...</span>:gizmoText||<span style={{color:"var(--text3)"}}>Notes will appear here.</span>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={copyGizmo} disabled={!gizmoText||gizmoLoading} style={{...S.btnBlue,fontSize:12,opacity:(!gizmoText||gizmoLoading)?0.4:1}}>{gizmoCopied?"✓ Copied!":"📋 Copy notes"}</button>
          <button onClick={()=>gizmoSearch(gizmoModal.subj?.name+" "+(gizmoModal.subj?.board||"")+" GCSE "+gizmoModal.subtopic)} style={{...S.btn,fontSize:12,color:"#a78bfa",borderColor:"rgba(124,58,237,0.3)"}}>🃏 Search Gizmo</button>
          {gizmoText&&<button onClick={()=>handleGizmoNotes(gizmoModal.subj,gizmoModal.topic,gizmoModal.subtopic,gizmoModal.rag)} style={{...S.btn,fontSize:12}}>↺ Regenerate</button>}
        </div>
        {gizmoText&&!gizmoLoading&&<div style={{fontSize:10,color:"var(--text3)",marginTop:10,lineHeight:1.5}}>Copy these notes, then on Gizmo click "Create deck" → paste into the text box → Gizmo will auto-generate flashcards for you.</div>}
      </div>
    </div>}
    {confirming&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:14,padding:28,maxWidth:420,width:"100%"}}>
        <div style={{fontSize:15,fontWeight:700,color:"var(--text)",marginBottom:12}}>📨 Confirm spec request</div>
        <div style={{background:"var(--bg)",borderRadius:8,padding:"10px 14px",marginBottom:12,border:"1px solid var(--border)"}}>
          <div style={{fontWeight:700,color:"var(--text)"}}>{confirming.emoji} {confirming.name}</div>
          <div style={{fontSize:12,color:"var(--text3)",marginTop:4}}>Exam board: <span style={{color:"var(--text)"}}>{reqBoard[confirming.id]}</span></div>
        </div>
        <div style={{fontSize:12,color:"var(--text3)",marginBottom:16,lineHeight:1.6}}>This sends a request to the site owner. You can only request each subject once. The spec will be added once ready.</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={sendRequest} disabled={reqLoading} style={{...S.btnGreen,flex:1,textAlign:"center",opacity:reqLoading?0.6:1}}>{reqLoading?"Sending...":"✓ Yes, send request"}</button>
          <button onClick={()=>setConfirming(null)} style={{...S.btn,flex:1,textAlign:"center"}}>Cancel</button>
        </div>
      </div>
    </div>}
    <div style={S.sectionHeader}>Spec Tracker</div>
    <p style={{color:"var(--text3)",fontSize:12,marginBottom:20,marginTop:4}}>Only subjects assigned in your timetable appear here.</p>
    {visibleSubjects.length===0&&<div style={{...S.card,color:"var(--text3)",fontSize:13}}>No subjects assigned yet — go to the Timetable tab first.</div>}

    {subjectsWithSpec.length>0&&<div style={{display:"grid",gap:12,marginBottom:20}}>
      {subjectsWithSpec.map(s=>{
        const prog=getProgress(s.id);const gPct=Math.round((prog.green/prog.total)*100);const open=expSubj===s.id;const actualColor=getActualColor(s.color);
        return <div key={s.id} style={{...S.card,borderLeft:`3px solid ${actualColor}`}}>
          <button style={S.subjBtn} onClick={()=>setExpSubj(open?null:s.id)}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>{s.emoji}</span>
              <div style={{textAlign:"left"}}>
                <div style={{fontWeight:700,color:"var(--text)",fontSize:14}}>{s.name}</div>
                <div style={{color:"var(--text3)",fontSize:11}}>{s.board} · {prog.total} subtopics</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={e=>{e.stopPropagation();gizmoSearch(s.name+" "+(s.board||"")+" GCSE flashcards");}} style={{...S.btn,fontSize:10,padding:"3px 8px",color:"#34d399",borderColor:"rgba(52,211,153,0.25)"}}>🔍 Gizmo</button>
              <div style={{textAlign:"right"}}>
                <div style={{color:actualColor,fontWeight:700,fontSize:15}}>{gPct}%</div>
                <div style={{color:"var(--text3)",fontSize:11}}>green</div>
              </div>
              <MiniProgress prog={prog}/>
              <span style={{color:"var(--text3)",fontSize:18}}>{open?"▲":"▼"}</span>
            </div>
          </button>
          {open&&<div style={{marginTop:12}}>
            {s.topics.map(t=>{
              const tOpen=expTopic[t.id];
              const tGreen=t.subtopics.filter((_,i)=>getVal(s.id,t.id,i).rag==="Green").length;
              return <div key={t.id} style={S.topicBlock}>
                <button style={S.topicBtn} onClick={()=>toggleTopic(t.id)}>
                  <span style={{color:"#c8d5e8",fontWeight:600,fontSize:13}}>{t.name}</span>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:11,color:"var(--green)"}}>✓ {tGreen}/{t.subtopics.length}</span>
                    <span style={{color:"var(--text3)",fontSize:14}}>{tOpen?"▲":"▼"}</span>
                  </div>
                </button>
                {tOpen&&<div style={{marginTop:8}}>
                  <div style={S.specHeader}>
                    <span style={{flex:3}}>Subtopic</span><span style={{flex:2}}>Coverage</span>
                    <span style={{flex:1,textAlign:"center"}}>RAG</span><span style={{flex:2}}>Last revised</span>
                  </div>
                  {t.subtopics.map((st,i)=>{
                    const v=getVal(s.id,t.id,i);
                    return <div key={i} style={{...S.specRow,background:RAG_BG[v.rag]||"transparent"}}>
                      <span style={{flex:3,color:"#c8d5e8",fontSize:12,paddingRight:8}}>{st}</span>
                      <select value={v.coverage} onChange={e=>setVal(s.id,t.id,i,"coverage",e.target.value)} style={{...S.specSel,flex:2}}>
                        {COVERAGE_OPTIONS.map(o=><option key={o} value={o}>{o}</option>)}
                      </select>
                      <div style={{flex:1,display:"flex",justifyContent:"center",gap:4}}>
                        {RAG_OPTIONS.map(r=><button key={r} title={r} onClick={()=>setVal(s.id,t.id,i,"rag",r)} style={{
                          width:14,height:14,borderRadius:"50%",background:RAG_COLORS[r],
                          border:v.rag===r?"2px solid white":"2px solid transparent",
                          cursor:"pointer",padding:0,flexShrink:0,
                          boxShadow:v.rag===r?`0 0 6px ${RAG_COLORS[r]}`:"none"
                        }}/>)}
                      </div>
                      <input type="date" value={v.date} onChange={e=>setVal(s.id,t.id,i,"date",e.target.value)} style={{...S.specDate,flex:2}}/>
                      <div style={{display:"flex",gap:3,flexShrink:0}}>
                        <button onClick={()=>gizmoSearch(s.name+" "+st+" GCSE")}
                          title="Copy topic name & open Gizmo"
                          style={{display:"flex",alignItems:"center",justifyContent:"center",width:22,height:22,background:"rgba(124,58,237,0.12)",border:"1px solid rgba(124,58,237,0.25)",borderRadius:4,fontSize:10,cursor:"pointer",color:"#a78bfa",padding:0}}>🃏</button>
                        {<button title="Generate AI notes for Gizmo" onClick={()=>handleGizmoNotes(s,t,st,v.rag)} style={{display:"flex",alignItems:"center",justifyContent:"center",width:22,height:22,background:"rgba(79,142,255,0.1)",border:"1px solid rgba(79,142,255,0.2)",borderRadius:4,fontSize:10,cursor:"pointer",color:"var(--accent)",padding:0}}>✦</button>}
                      </div>
                    </div>;
                  })}
                </div>}
              </div>;
            })}
          </div>}
        </div>;
      })}
    </div>}

    {subjectsWithoutSpec.length>0&&<div>
      <div style={{fontSize:12,color:"var(--text3)",marginBottom:12,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Subjects without spec data</div>
      <div style={{display:"grid",gap:12}}>
        {subjectsWithoutSpec.map(s=>{const actualColor=getActualColor(s.color);return <div key={s.id} style={{...S.card,borderLeft:`3px solid ${actualColor}`}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <span style={{fontSize:20}}>{s.emoji}</span>
            <div style={{fontWeight:700,color:"var(--text)",fontSize:14}}>{s.name}</div>
          </div>
          <div style={{background:"var(--bg4)",borderRadius:8,padding:14,border:"1px solid var(--border)"}}>
            <div style={{fontSize:12,color:"var(--text3)",marginBottom:10}}>No exam board spec found for this subject yet.</div>
            {alreadySent(s.id)
              ?<div style={{fontSize:12,color:"var(--green)"}}>✓ Request sent! It will be added soon.</div>
              :<div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <input value={reqBoard[s.id]||""} onChange={e=>setReqBoard(p=>({...p,[s.id]:e.target.value}))}
                  placeholder="Enter your exam board (e.g. AQA, Edexcel, OCR...)" style={{...S.input,fontSize:12,flex:1,minWidth:200}}/>
                <button onClick={()=>{if(reqBoard[s.id]&&reqBoard[s.id].trim())setConfirming(s);}} disabled={!reqBoard[s.id]?.trim()} style={{...S.btnGreen,fontSize:12,flexShrink:0,opacity:reqBoard[s.id]?.trim()?1:0.4}}>📨 Request spec</button>
              </div>
            }
          </div>
        </div>;})}
      </div>
    </div>}
  </div>;
}

// ─── POMODORO TIMER ──────────────────────────────────────────────────────────
function PomodoroTimer({onClose,assignedSubjectIds,setRevisionLog}){
  const DURATIONS=[{label:"15 min",mins:15},{label:"25 min",mins:25},{label:"30 min",mins:30},{label:"45 min",mins:45},{label:"60 min",mins:60}];
  const [durIdx,setDurIdx]=useState(1);
  const dur=DURATIONS[durIdx];
  const [secsLeft,setSecsLeft]=useState(dur.mins*60);
  const [running,setRunning]=useState(false);
  const [session,setSession]=useState(0);
  const [subject,setSubject]=useState(assignedSubjectIds[0]||"");
  const [note,setNote]=useState("");
  const [justFinished,setJustFinished]=useState(false);
  const intervalRef=useRef(null);
  const RING_COLOR="#4f8eff";
  const total=dur.mins*60;
  const pct=Math.max(0,(secsLeft/total)*100);
  const minsDisp=String(Math.floor(secsLeft/60)).padStart(2,"0");
  const secsDisp=String(secsLeft%60).padStart(2,"0");
  const circumference=2*Math.PI*52;
  const dashOffset=circumference*(1-pct/100);

  const switchDur=(idx)=>{if(running)return;setDurIdx(idx);setSecsLeft(DURATIONS[idx].mins*60);setJustFinished(false);};
  const reset=()=>{setSecsLeft(dur.mins*60);setRunning(false);setJustFinished(false);};

  useEffect(()=>{
    if(running){
      intervalRef.current=setInterval(()=>{
        setSecsLeft(p=>{
          if(p<=1){
            clearInterval(intervalRef.current);
            setRunning(false);
            setSession(s=>s+1);
            setJustFinished(true);
            return 0;
          }
          return p-1;
        });
      },1000);
    }
    return()=>clearInterval(intervalRef.current);
  },[running]);

  const logSession=()=>{
    const subj=ALL_SUBJECTS.find(s=>s.id===subject);
    const entry={id:Date.now().toString(),date:new Date().toISOString(),subject:subject,subjectName:subj?.name||subject,emoji:subj?.emoji||"📚",duration:dur.mins,note:note.trim(),type:"Pomodoro"};
    setRevisionLog(p=>[entry,...(p||[])]);
    setNote("");setJustFinished(false);reset();
  };

  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:20,padding:"28px 32px",width:"100%",maxWidth:400,boxShadow:"0 24px 80px rgba(0,0,0,0.6)"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{fontSize:15,fontWeight:700,color:"var(--text)"}}>🍅 Pomodoro Timer</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {session>0&&<span style={{fontSize:11,color:"var(--green)",background:"rgba(52,211,153,0.1)",border:"1px solid rgba(52,211,153,0.2)",borderRadius:20,padding:"2px 10px",fontFamily:"var(--mono)"}}>{session} 🍅 today</span>}
          <button onClick={onClose} style={{...S.btn,padding:"4px 10px",fontSize:12}}>✕</button>
        </div>
      </div>

      {/* Duration selector */}
      <div style={{display:"flex",gap:4,marginBottom:22,background:"var(--bg4)",borderRadius:10,padding:4}}>
        {DURATIONS.map((d,i)=><button key={d.label} onClick={()=>switchDur(i)} style={{flex:1,padding:"5px 0",borderRadius:7,border:"none",fontSize:11,fontWeight:600,cursor:running?"not-allowed":"pointer",fontFamily:"var(--mono)",background:durIdx===i?RING_COLOR+"30":"transparent",color:durIdx===i?RING_COLOR:"var(--text3)",transition:"all 0.15s",opacity:running&&durIdx!==i?0.4:1}}>{d.label}</button>)}
      </div>

      {/* Ring timer */}
      <div style={{display:"flex",justifyContent:"center",marginBottom:22}}>
        <div style={{position:"relative",width:150,height:150}}>
          <svg width="150" height="150" style={{transform:"rotate(-90deg)"}}>
            <circle cx="75" cy="75" r="56" fill="none" stroke="var(--border)" strokeWidth="8"/>
            <circle cx="75" cy="75" r="56" fill="none" stroke={justFinished?"#34d399":RING_COLOR} strokeWidth="8"
              strokeDasharray={circumference*56/52} strokeDashoffset={(circumference*56/52)*(1-pct/100)}
              style={{transition:"stroke-dashoffset 1s linear",strokeLinecap:"round"}}/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            {justFinished
              ?<div style={{fontSize:36}}>🎉</div>
              :<><div style={{fontSize:34,fontWeight:700,color:"var(--text)",fontFamily:"var(--mono)",letterSpacing:-2}}>{minsDisp}:{secsDisp}</div>
              <div style={{fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,marginTop:2}}>{running?"focusing...":"ready"}</div></>
            }
          </div>
        </div>
      </div>

      {/* Controls */}
      {!justFinished&&<div style={{display:"flex",gap:8,marginBottom:18,justifyContent:"center"}}>
        <button onClick={()=>setRunning(p=>!p)} style={{background:running?"rgba(248,113,113,0.15)":"linear-gradient(135deg,#1a4fd8,#4f8eff)",border:"1px solid "+(running?"rgba(248,113,113,0.3)":"rgba(79,142,255,0.4)"),borderRadius:10,color:running?"#f87171":"white",padding:"11px 32px",fontSize:14,fontWeight:700,fontFamily:"var(--font)",cursor:"pointer",transition:"all 0.15s",minWidth:110}}>
          {running?"⏸ Pause":"▶ Start"}
        </button>
        <button onClick={reset} style={{...S.btn,padding:"11px 18px",fontSize:13}}>↺</button>
      </div>}

      {/* Log session */}
      {justFinished&&<div style={{background:"rgba(52,211,153,0.08)",border:"1px solid rgba(52,211,153,0.25)",borderRadius:12,padding:16,marginBottom:10}}>
        <div style={{fontSize:13,color:"var(--green)",fontWeight:700,marginBottom:12}}>Session complete! Log it?</div>
        <div style={{marginBottom:8}}>
          <div style={{fontSize:10,color:"var(--text3)",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Subject</div>
          <select value={subject} onChange={e=>setSubject(e.target.value)} style={{...S.sel,height:"auto"}}>
            {assignedSubjectIds.map(id=>{const s=ALL_SUBJECTS.find(x=>x.id===id);return s?<option key={id} value={id}>{s.emoji} {s.name}</option>:null;})}
            <option value="">Other</option>
          </select>
        </div>
        <input value={note} onChange={e=>setNote(e.target.value)} placeholder="What did you cover? (optional)" style={{...S.input,fontSize:12,marginBottom:10}}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={logSession} style={{...S.btnGreen,flex:1,textAlign:"center",padding:"8px"}}>✓ Log session</button>
          <button onClick={()=>{setJustFinished(false);reset();}} style={{...S.btn,fontSize:12}}>Skip</button>
        </div>
      </div>}

      <div style={{fontSize:10,color:"var(--text3)",textAlign:"center",lineHeight:1.6}}>Press <kbd style={{background:"var(--bg4)",border:"1px solid var(--border)",borderRadius:3,padding:"1px 4px",fontSize:9}}>P</kbd> anywhere to open · Change duration before starting</div>
    </div>
  </div>;
}

// ─── REVISION LOGGER ─────────────────────────────────────────────────────────
function RevisionLogger({revisionLog,setRevisionLog,assignedSubjectIds}){
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({subject:"",date:new Date().toISOString().split("T")[0],duration:"30",note:"",type:"Self-study"});
  const [filterSubj,setFilterSubj]=useState("all");

  const addEntry=()=>{
    if(!form.subject||!form.date)return;
    const subj=ALL_SUBJECTS.find(s=>s.id===form.subject);
    const entry={id:Date.now().toString(),date:new Date(form.date).toISOString(),subject:form.subject,subjectName:subj?.name||form.subject,emoji:subj?.emoji||"📚",duration:parseInt(form.duration)||30,note:form.note.trim(),type:form.type};
    setRevisionLog(p=>[entry,...(p||[])]);
    setForm({subject:"",date:new Date().toISOString().split("T")[0],duration:"30",note:"",type:"Self-study"});
    setShowAdd(false);
  };

  const del=(id)=>setRevisionLog(p=>(p||[]).filter(e=>e.id!==id));

  const logs=revisionLog||[];
  const filtered=filterSubj==="all"?logs:logs.filter(e=>e.subject===filterSubj);

  // Stats
  const totalMins=logs.reduce((a,e)=>a+(e.duration||0),0);
  const todayStr=new Date().toISOString().split("T")[0];
  const todayMins=logs.filter(e=>e.date.startsWith(todayStr)).reduce((a,e)=>a+(e.duration||0),0);
  const subjMins={};
  logs.forEach(e=>{subjMins[e.subject]=(subjMins[e.subject]||0)+(e.duration||0);});
  const topSubj=Object.entries(subjMins).sort((a,b)=>b[1]-a[1])[0];
  const topSubjData=topSubj?ALL_SUBJECTS.find(s=>s.id===topSubj[0]):null;

  // Group by date
  const grouped={};
  filtered.forEach(e=>{const d=e.date.split("T")[0];if(!grouped[d])grouped[d]=[];grouped[d].push(e);});
  const sortedDates=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));

  const fmtMins=(m)=>{if(m>=60){var h=Math.floor(m/60);var r=m%60;return h+"h "+(r>0?r+"m":"");}return m+"m";};
  const fmtDate=(iso)=>{const d=new Date(iso+"T00:00:00");return d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});};

  return <div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
      <div style={S.sectionHeader}>📓 Revision Log</div>
      <button onClick={()=>setShowAdd(p=>!p)} style={S.btnBlue}>{showAdd?"✕ Cancel":"＋ Log session"}</button>
    </div>
    <p style={{color:"var(--text3)",fontSize:12,marginBottom:20,marginTop:4}}>Track every revision session to see patterns and stay accountable.</p>

    {/* Stats strip */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
      {[
        {label:"Total time",value:fmtMins(totalMins),icon:"⏱",color:"var(--accent)"},
        {label:"Today",value:fmtMins(todayMins),icon:"📅",color:"var(--green)"},
        {label:"Top subject",value:topSubjData?topSubjData.emoji+" "+topSubjData.name:"—",icon:"🏆",color:"var(--amber)"},
      ].map(st=><div key={st.label} style={{...S.card,textAlign:"center",padding:"14px 12px",margin:0}}>
        <div style={{fontSize:20,marginBottom:6}}>{st.icon}</div>
        <div style={{fontSize:16,fontWeight:700,color:st.color,marginBottom:2,fontFamily:"var(--mono)"}}>{st.value}</div>
        <div style={{fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:1}}>{st.label}</div>
      </div>)}
    </div>

    {/* Add form */}
    {showAdd&&<div style={{...S.card,marginBottom:20,border:"1px solid rgba(79,142,255,0.3)",background:"var(--bg3)"}}>
      <div style={{fontSize:12,color:"var(--accent)",fontWeight:600,marginBottom:14}}>Log a revision session</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div>
          <div style={{fontSize:10,color:"var(--text3)",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Subject</div>
          <select value={form.subject} onChange={e=>setForm(p=>({...p,subject:e.target.value}))} style={{...S.sel,height:"auto"}}>
            <option value="">Pick subject</option>
            {ALL_SUBJECTS.filter(s=>assignedSubjectIds.includes(s.id)).map(s=><option key={s.id} value={s.id}>{s.emoji} {s.name}</option>)}
          </select>
        </div>
        <div>
          <div style={{fontSize:10,color:"var(--text3)",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Type</div>
          <select value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))} style={{...S.sel,height:"auto"}}>
            {["Self-study","Past paper","Flashcards","Mind map","Notes","With tutor","Homework","Other"].map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </div>
        <div>
          <div style={{fontSize:10,color:"var(--text3)",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Date</div>
          <input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={{...S.specDate,width:"100%",padding:"7px 8px",fontSize:12}}/>
        </div>
        <div>
          <div style={{fontSize:10,color:"var(--text3)",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Duration (mins)</div>
          <select value={form.duration} onChange={e=>setForm(p=>({...p,duration:e.target.value}))} style={{...S.sel,height:"auto"}}>
            {["15","20","25","30","45","60","90","120"].map(t=><option key={t} value={t}>{fmtMins(parseInt(t))}</option>)}
          </select>
        </div>
      </div>
      <input value={form.note} onChange={e=>setForm(p=>({...p,note:e.target.value}))} placeholder="What did you cover? (optional)" style={{...S.input,fontSize:12,marginBottom:12}}/>
      <button onClick={addEntry} disabled={!form.subject||!form.date} style={{...S.btnBlue,opacity:(!form.subject||!form.date)?0.4:1}}>✓ Save entry</button>
    </div>}

    {/* Filter */}
    {logs.length>0&&<div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
      <span style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--mono)"}}>Filter:</span>
      {[{id:"all",name:"All"},...ALL_SUBJECTS.filter(s=>subjMins[s.id])].map(s=>{
        const actualColor=s.id==="all"?"var(--text2)":getActualColor(ALL_SUBJECTS.find(x=>x.id===s.id)?.color||"#8a9ab8");
        return <button key={s.id} onClick={()=>setFilterSubj(s.id)} style={{...S.btn,fontSize:11,padding:"3px 10px",borderColor:filterSubj===s.id?actualColor:"var(--border2)",color:filterSubj===s.id?actualColor:"var(--text3)"}}>{s.emoji?s.emoji+" ":""}{s.name}</button>;
      })}
    </div>}

    {/* Log entries */}
    {sortedDates.length===0&&<div style={{...S.card,color:"var(--text3)",fontSize:13,textAlign:"center",padding:32}}>No sessions logged yet. Press "Log session" or use the Pomodoro timer!</div>}
    {sortedDates.map(date=>{
      const dayTotal=grouped[date].reduce((a,e)=>a+(e.duration||0),0);
      return <div key={date} style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:12,fontWeight:600,color:"var(--text2)",fontFamily:"var(--mono)"}}>{fmtDate(date)}</div>
          <div style={{fontSize:11,color:"var(--text3)",background:"var(--bg3)",borderRadius:5,padding:"2px 8px"}}>{fmtMins(dayTotal)}</div>
        </div>
        <div style={{display:"grid",gap:6}}>
          {grouped[date].map(e=>{
            const subj=ALL_SUBJECTS.find(s=>s.id===e.subject);
            const actualColor=getActualColor(subj?.color||"#8a9ab8");
            return <div key={e.id} style={{display:"flex",alignItems:"center",gap:12,background:"var(--bg2)",borderRadius:8,padding:"10px 14px",border:`1px solid ${actualColor}22`,borderLeft:`3px solid ${actualColor}`}}>
              <span style={{fontSize:18}}>{e.emoji}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{color:"var(--text)",fontWeight:600,fontSize:13}}>{e.subjectName}</span>
                  <span style={{fontSize:10,background:actualColor+"20",color:actualColor,borderRadius:4,padding:"1px 6px"}}>{e.type}</span>
                  {e.type==="Pomodoro"&&<span style={{fontSize:10,color:"var(--text3)"}}>🍅</span>}
                </div>
                {e.note&&<div style={{fontSize:11,color:"var(--text3)",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.note}</div>}
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:13,fontWeight:700,color:"var(--text2)",fontFamily:"var(--mono)"}}>{fmtMins(e.duration)}</div>
                <button onClick={()=>del(e.id)} style={{...S.btn,padding:"1px 6px",fontSize:10,color:"var(--text3)",marginTop:2}}>✕</button>
              </div>
            </div>;
          })}
        </div>
      </div>;
    })}
  </div>;
}

// ─── MENU BTN HELPER ──────────────────────────────────────────────────────────
function MenuBtn({icon,label,onClick,danger}){
  const [hover,setHover]=useState(false);
  return <button onClick={onClick}
    onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
    style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 12px",borderRadius:8,border:"none",background:hover?"var(--bg3)":"transparent",cursor:"pointer",fontSize:13,color:danger?"#f87171":"var(--text2)",fontFamily:"var(--font)",textAlign:"left",transition:"background 0.12s"}}>
    <span>{icon}</span><span>{label}</span>
  </button>;
}

// ─── SHORTCUTS MODAL ─────────────────────────────────────────────────────────
function ShortcutsModal({onClose}){
  const shortcuts=[
    ["P","Open / close Pomodoro timer"],
    ["1","Go to Timetable tab"],
    ["2","Go to Grades tab"],
    ["3","Go to Spec Tracker tab"],
    ["4","Go to AI Coach tab"],
    ["5","Go to Revision Log tab"],
    ["?  or  /","Show keyboard shortcuts"],
    ["Esc","Close any open panel"],
  ];
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:250,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:16,padding:"28px",width:"100%",maxWidth:420}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{fontSize:15,fontWeight:700,color:"var(--text)"}}>⌨️ Keyboard Shortcuts</div>
        <button onClick={onClose} style={{...S.btn,padding:"4px 10px"}}>✕</button>
      </div>
      <div style={{display:"grid",gap:4}}>
        {shortcuts.map(([k,desc])=><div key={k} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
          <div style={{background:"var(--bg4)",border:"1px solid var(--border2)",borderRadius:6,padding:"3px 10px",fontFamily:"var(--mono)",fontSize:12,fontWeight:700,color:"var(--text)",minWidth:36,textAlign:"center",whiteSpace:"nowrap"}}>{k}</div>
          <div style={{fontSize:12,color:"var(--text2)"}}>{desc}</div>
        </div>)}
      </div>
    </div>
  </div>;
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState("timetable");
  const [timetable,setTimetableRaw]=useState({});
  const [subtopicData,setSubtopicDataRaw]=useState({});
  const [grades,setGradesRaw]=useState({});
  const [tests,setTestsRaw]=useState([]);
  const [groqKey,setGroqKeyRaw]=useState("");
  const [openrouterKey,setOpenrouterKeyRaw]=useState("");
  const [hfKey,setHfKeyRaw]=useState("");
  const [aiProvider,setAiProviderRaw]=useState("groq");
  const [specRequests,setSpecRequestsRaw]=useState([]);
  const [chats,setChatsRaw]=useState([]);
  const [revisionLog,setRevisionLogRaw]=useState([]);
  const [showPomodoro,setShowPomodoro]=useState(false);
  const [expSubj,setExpSubj]=useState(null);
  const [expTopic,setExpTopic]=useState({});
  const [saving,setSaving]=useState(false);
  const [checking,setChecking]=useState(true);
  const [showSettings,setShowSettings]=useState(false);
  const [showMenu,setShowMenu]=useState(false);
  const [showShortcuts,setShowShortcuts]=useState(false);
  const saveTimer=useRef(null);
  const menuRef=useRef(null);

  // Keyboard shortcuts
  useEffect(()=>{
    const handler=(e)=>{
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT")return;
      if(e.key==="Escape"){setShowPomodoro(false);setShowMenu(false);setShowSettings(false);setShowShortcuts(false);}
      else if(e.key==="p"||e.key==="P")setShowPomodoro(p=>!p);
      else if(e.key==="1")setTab("timetable");
      else if(e.key==="2")setTab("grades");
      else if(e.key==="3")setTab("spec");
      else if(e.key==="4")setTab("ai");
      else if(e.key==="5")setTab("log");
      else if(e.key==="?"||e.key==="/")setShowShortcuts(p=>!p);
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[]);

  // Close menu on outside click
  useEffect(()=>{
    const handler=(e)=>{if(menuRef.current&&!menuRef.current.contains(e.target))setShowMenu(false);};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[]);

  const downloadData=()=>{
    const data={timetable,spec:subtopicData,grades,tests,groqKey,openrouterKey,aiProvider,specRequests,chats,revisionLog,exportedAt:new Date().toISOString(),username:user?.username};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="gcse-tracker-backup.json";a.click();
  };

  const uploadData=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.timetable)setTimetableRaw(d.timetable);
        if(d.spec)setSubtopicDataRaw(d.spec);
        if(d.grades)setGradesRaw(d.grades);
        if(d.tests)setTestsRaw(d.tests);
        if(d.groqKey!==undefined)setGroqKeyRaw(d.groqKey);
        if(d.openrouterKey!==undefined)setOpenrouterKeyRaw(d.openrouterKey);
        if(d.hfKey!==undefined)setHfKeyRaw(d.hfKey);
        if(d.aiProvider)setAiProviderRaw(d.aiProvider);
        if(d.specRequests)setSpecRequestsRaw(d.specRequests);
        if(d.chats)setChatsRaw(d.chats);
        if(d.revisionLog)setRevisionLogRaw(d.revisionLog);
        if(user)saveToFirebase(user.uid,d.timetable||{},d.spec||{},d.grades||{},d.tests||[],d.groqKey||"",d.openrouterKey||"",d.hfKey||"",d.aiProvider||"groq",d.specRequests||[],d.chats||[],d.revisionLog||[]);
        alert("Data restored successfully!");
      }catch(err){alert("Invalid backup file.");}
    };
    reader.readAsText(file);
    e.target.value="";
  };

  useEffect(()=>{
    const tryRestore=()=>{
      if(!window.__firebase){window.addEventListener("firebaseReady",tryRestore,{once:true});return;}
      const unsub=window.__firebase.onAuthChange(async(fbUser)=>{
        if(fbUser){
          try{
            const snap=await window.__firebase.loadDoc(fbUser.uid);
            if(snap){
              setTimetableRaw(snap.timetable||{});setSubtopicDataRaw(snap.spec||{});
              setGradesRaw(snap.grades||{});setTestsRaw(snap.tests||[]);setGroqKeyRaw(snap.groqKey||"");
              setOpenrouterKeyRaw(snap.openrouterKey||"");setHfKeyRaw(snap.hfKey||"");setAiProviderRaw(snap.aiProvider||"groq");
              setSpecRequestsRaw(snap.specRequests||[]);setChatsRaw(snap.chats||[]);setRevisionLogRaw(snap.revisionLog||[]);
              setUser({uid:fbUser.uid,username:snap.username||fbUser.email.replace("@gcsetracker.app","")});
            }
          }catch(e){console.error(e);}
        }
        setChecking(false);
      });
      return unsub;
    };
    const unsub=tryRestore();
    return()=>{if(typeof unsub==="function")unsub();};
  },[]);

  const saveToFirebase=useCallback(async(uid,tt,spec,gr,ts,gk,gmk,hfk,ap,sr,ch,rl)=>{
    if(!uid||!window.__firebase)return;
    setSaving(true);
    await window.__firebase.saveData(uid,{timetable:tt,spec,grades:gr,tests:ts,groqKey:gk,openrouterKey:gmk,hfKey:hfk,aiProvider:ap,specRequests:sr,chats:ch,revisionLog:rl});
    setSaving(false);
  },[]);

  const debouncedSave=useCallback((uid,tt,spec,gr,ts,gk,gmk,hfk,ap,sr,ch,rl)=>{
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>saveToFirebase(uid,tt,spec,gr,ts,gk,gmk,hfk,ap,sr,ch,rl),1500);
  },[saveToFirebase]);

  const setTimetable=v=>{const next=typeof v==="function"?v(timetable):v;setTimetableRaw(next);if(user)debouncedSave(user.uid,next,subtopicData,grades,tests,groqKey,openrouterKey,hfKey,aiProvider,specRequests,chats,revisionLog);};
  const setSubtopicData=v=>{const next=typeof v==="function"?v(subtopicData):v;setSubtopicDataRaw(next);if(user)debouncedSave(user.uid,timetable,next,grades,tests,groqKey,openrouterKey,hfKey,aiProvider,specRequests,chats,revisionLog);};
  const setGrades=v=>{const next=typeof v==="function"?v(grades):v;setGradesRaw(next);if(user)debouncedSave(user.uid,timetable,subtopicData,next,tests,groqKey,openrouterKey,hfKey,aiProvider,specRequests,chats,revisionLog);};
  const setTests=v=>{const next=typeof v==="function"?v(tests):v;setTestsRaw(next);if(user)debouncedSave(user.uid,timetable,subtopicData,grades,next,groqKey,openrouterKey,hfKey,aiProvider,specRequests,chats,revisionLog);};
  const setGroqKey=v=>{setGroqKeyRaw(v);if(user)debouncedSave(user.uid,timetable,subtopicData,grades,tests,v,openrouterKey,hfKey,aiProvider,specRequests,chats,revisionLog);};
  const setOpenrouterKey=v=>{setOpenrouterKeyRaw(v);if(user)debouncedSave(user.uid,timetable,subtopicData,grades,tests,groqKey,v,hfKey,aiProvider,specRequests,chats,revisionLog);};
  const setHfKey=v=>{setHfKeyRaw(v);if(user)debouncedSave(user.uid,timetable,subtopicData,grades,tests,groqKey,openrouterKey,v,aiProvider,specRequests,chats,revisionLog);};
  const setAiProvider=v=>{setAiProviderRaw(v);if(user)debouncedSave(user.uid,timetable,subtopicData,grades,tests,groqKey,openrouterKey,hfKey,v,specRequests,chats,revisionLog);};
  const setSpecRequests=v=>{const next=typeof v==="function"?v(specRequests):v;setSpecRequestsRaw(next);if(user)debouncedSave(user.uid,timetable,subtopicData,grades,tests,groqKey,openrouterKey,hfKey,aiProvider,next,chats,revisionLog);};
  const setRevisionLog=v=>{
    if(typeof v==="function"){
      setRevisionLogRaw(prev=>{
        const next=v(prev);
        setTimeout(()=>{if(user)saveToFirebase(user.uid,timetable,subtopicData,grades,tests,groqKey,openrouterKey,hfKey,aiProvider,specRequests,chats,next);},0);
        return next;
      });
    } else {
      setRevisionLogRaw(v);
      if(user)debouncedSave(user.uid,timetable,subtopicData,grades,tests,groqKey,openrouterKey,hfKey,aiProvider,specRequests,chats,v);
    }
  };
  const setChats=v=>{
    if(typeof v==="function"){
      setChatsRaw(prev=>{
        const next=v(prev);
        setTimeout(()=>{if(user)saveToFirebase(user.uid,timetable,subtopicData,grades,tests,groqKey,openrouterKey,hfKey,aiProvider,specRequests,next,revisionLog);},0);
        return next;
      });
    } else {
      setChatsRaw(v);
      if(user)debouncedSave(user.uid,timetable,subtopicData,grades,tests,groqKey,openrouterKey,hfKey,aiProvider,specRequests,v,revisionLog);
    }
  };

  const handleLogin=(uid,username,data)=>{
    setTimetableRaw(data.timetable||{});setSubtopicDataRaw(data.spec||{});
    setGradesRaw(data.grades||{});setTestsRaw(data.tests||[]);setGroqKeyRaw(data.groqKey||"");
    setOpenrouterKeyRaw(data.openrouterKey||"");setHfKeyRaw(data.hfKey||"");setAiProviderRaw(data.aiProvider||"groq");
    setSpecRequestsRaw(data.specRequests||[]);setChatsRaw(data.chats||[]);setRevisionLogRaw(data.revisionLog||[]);
    setUser({uid,username});
  };
  const handleLogout=async()=>{
    await window.__firebase.logout();
    setUser(null);setTimetableRaw({});setSubtopicDataRaw({});setGradesRaw({});setTestsRaw([]);setGroqKeyRaw("");setOpenrouterKeyRaw("");setHfKeyRaw("");setAiProviderRaw("groq");setSpecRequestsRaw([]);setChatsRaw([]);setRevisionLogRaw([]);
  };

  const getVal=(sId,tId,i)=>subtopicData[`${sId}__${tId}__${i}`]||{coverage:"Not covered",rag:"None",date:""};
  const setVal=(sId,tId,i,field,value)=>{const k=`${sId}__${tId}__${i}`;setSubtopicData(p=>({...p,[k]:{...getVal(sId,tId,i),[field]:value}}));};
  const getProgress=(sId)=>{
    const subj=SUBJECTS.find(s=>s.id===sId);if(!subj)return{total:1,green:0,amber:0,red:1};
    let total=0,green=0,amber=0;
    subj.topics.forEach(t=>t.subtopics.forEach((_,i)=>{total++;const v=getVal(sId,t.id,i);if(v.rag==="Green")green++;else if(v.rag==="Amber")amber++;}));
    return{total,green,amber,red:total-green-amber};
  };

  const assignedSubjectIds=[...new Set(Object.values(timetable).flatMap(v=>Array.isArray(v)?v:(v?[v]:[])).filter(Boolean))];

  if(checking)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",color:"var(--text3)",fontFamily:"var(--mono)",fontSize:13}}>Connecting...</div>;
  if(!user)return <LoginScreen onLogin={handleLogin}/>;

  return <div style={S.root}>
    {showSettings&&<Settings groqKey={groqKey} setGroqKey={setGroqKey} openrouterKey={openrouterKey} setOpenrouterKey={setOpenrouterKey} hfKey={hfKey} setHfKey={setHfKey} aiProvider={aiProvider} setAiProvider={setAiProvider} onClose={()=>setShowSettings(false)}/>}
    {showShortcuts&&<ShortcutsModal onClose={()=>setShowShortcuts(false)}/>}
    <div style={S.header}>
      <div style={S.headerInner}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:40,height:40,background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,boxShadow:"0 0 12px rgba(79,142,255,0.1)"}}>📋</div>
          <div style={S.title}>GCSE Revision Tracker</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:saving?"var(--text3)":"var(--green)",fontFamily:"var(--mono)",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,padding:"3px 10px",transition:"color 0.3s"}}>{saving?"⟳ Saving":"✓ Saved"}</span>
          {(aiProvider==="openrouter"?openrouterKey:aiProvider==="huggingface"?hfKey:groqKey)&&<span style={{fontSize:11,color:"var(--green)",background:"rgba(74,222,128,0.1)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:4,padding:"2px 7px"}}>🤖 {aiProvider==="openrouter"?"OpenRouter":aiProvider==="huggingface"?"Hugging Face":"Groq"}</span>}
          <button onClick={()=>setShowPomodoro(true)} style={{...S.btn,color:"#f87171",borderColor:"rgba(248,113,113,0.3)"}}>🍅</button>
          {/* Menu */}
          <div ref={menuRef} style={{position:"relative"}}>
            <button onClick={()=>setShowMenu(p=>!p)} style={{...S.btn,fontWeight:700,fontSize:14,padding:"6px 12px",background:showMenu?"var(--bg4)":"var(--bg3)"}}>
              <span style={{fontSize:13,color:"var(--text2)"}}>👤 {user.username}</span>
              <span style={{marginLeft:6,color:"var(--text3)",fontSize:11}}>{showMenu?"▲":"▼"}</span>
            </button>
            {showMenu&&<div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:12,padding:"6px",minWidth:200,zIndex:150,boxShadow:"0 8px 32px rgba(0,0,0,0.35)"}}>
              <div style={{padding:"6px 12px 8px",borderBottom:"1px solid var(--border)",marginBottom:4}}>
                <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--mono)"}}>Signed in as</div>
                <div style={{fontSize:12,fontWeight:700,color:"var(--text)"}}>{user.username}</div>
              </div>
              <MenuBtn icon="🤖" label="AI Setup" onClick={()=>{setShowSettings(true);setShowMenu(false);}}/>
              <div style={{borderTop:"1px solid var(--border)",margin:"4px 0"}}/>
              <MenuBtn icon="⬇️" label="Download data" onClick={()=>{downloadData();setShowMenu(false);}}/>
              <label style={{display:"flex",alignItems:"center",gap:8,padding:"7px 12px",borderRadius:8,cursor:"pointer",fontSize:13,color:"var(--text2)",transition:"background 0.12s"}}
                onMouseEnter={e=>e.currentTarget.style.background="var(--bg3)"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span>⬆️</span><span>Upload data</span>
                <input type="file" accept=".json" style={{display:"none"}} onChange={(e)=>{uploadData(e);setShowMenu(false);}}/>
              </label>
              <div style={{borderTop:"1px solid var(--border)",margin:"4px 0"}}/>
              <MenuBtn icon="⌨️" label="Keyboard shortcuts" onClick={()=>{setShowShortcuts(true);setShowMenu(false);}}/>
              <MenuBtn icon="🚪" label="Log out" onClick={()=>{handleLogout();setShowMenu(false);}} danger={true}/>
            </div>}
          </div>
        </div>
      </div>
      <div style={S.tabBar}>
        {[["timetable","📅 Timetable"],["grades","📊 Grades"],["spec","📖 Spec Tracker"],["ai","🤖 AI Coach"],["log","📓 Rev. Log"]].map(([id,label])=>
          <button key={id} style={{...S.tabBtn,...(tab===id?S.tabActive:{})}} onClick={()=>setTab(id)}>{label}</button>
        )}
      </div>
    </div>
    <div style={S.body}>
      {showPomodoro&&<PomodoroTimer onClose={()=>setShowPomodoro(false)} assignedSubjectIds={assignedSubjectIds} revisionLog={revisionLog} setRevisionLog={setRevisionLog}/>}
      {tab==="timetable"&&<Timetable timetable={timetable} setTimetable={setTimetable} tests={tests} setTests={setTests} groqKey={groqKey} openrouterKey={openrouterKey} hfKey={hfKey} aiProvider={aiProvider} getProgress={getProgress} subtopicData={subtopicData} setShowSettings={setShowSettings}/>}
      {tab==="grades"&&<Grades grades={grades} setGrades={setGrades} getProgress={getProgress} assignedSubjectIds={assignedSubjectIds}/>}
      {tab==="spec"&&<SpecTracker expSubj={expSubj} setExpSubj={setExpSubj} expTopic={expTopic} setExpTopic={setExpTopic} getVal={getVal} setVal={setVal} getProgress={getProgress} assignedSubjectIds={assignedSubjectIds} user={user} specRequests={specRequests} setSpecRequests={setSpecRequests} aiConfig={{provider:aiProvider,key:aiProvider==="openrouter"?openrouterKey:aiProvider==="huggingface"?hfKey:groqKey}}/>}
      {tab==="ai"&&<AICoach groqKey={groqKey} openrouterKey={openrouterKey} hfKey={hfKey} aiProvider={aiProvider} subtopicData={subtopicData} tests={tests} chats={chats} setChats={setChats}/>}
      {tab==="log"&&<RevisionLogger revisionLog={revisionLog} setRevisionLog={setRevisionLog} assignedSubjectIds={assignedSubjectIds}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
