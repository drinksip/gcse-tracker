<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDVr3v8NK2U0kueAsJ_WcDcLyFUNk7k2T0",
    authDomain: "gcse-tracker-4dd48.firebaseapp.com",
    projectId: "gcse-tracker-4dd48",
    storageBucket: "gcse-tracker-4dd48.firebasestorage.app",
    messagingSenderId: "570623522939",
    appId: "1:570623522939:web:5ac79d309dbe77df5ecade"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  window.__firebase = {
    async register(username, password) {
      const email = username.trim().toLowerCase() + "@gcsetracker.app";
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, "users", cred.user.uid), { username: username.trim().toLowerCase(), timetable:{}, spec:{}, grades:{}, tests:[], geminiKey:"" });
      return { uid: cred.user.uid, username: username.trim().toLowerCase() };
    },
    async login(username, password) {
      const email = username.trim().toLowerCase() + "@gcsetracker.app";
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const snap = await getDoc(doc(db, "users", cred.user.uid));
      return { uid: cred.user.uid, username: username.trim().toLowerCase(), data: snap.exists() ? snap.data() : {} };
    },
    async logout() { await signOut(auth); },
    async saveData(uid, data) { await setDoc(doc(db, "users", uid), data, { merge: true }); },
    async loadDoc(uid) { const snap = await getDoc(doc(db, "users", uid)); return snap.exists() ? snap.data() : null; },
    async sendSpecRequest(username, subjectId, subjectName, examBoard) {
      await addDoc(collection(db, "spec_requests"), { username, subjectId, subjectName, examBoard, timestamp: new Date().toISOString() });
    },
    onAuthChange(cb) { return onAuthStateChanged(auth, cb); }
  };

  window.dispatchEvent(new Event("firebaseReady"));
</script>

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);
  const [fbReady,setFbReady]=useState(!!window.__firebase);

  useEffect(()=>{
    if(!window.__firebase){
      const h=()=>setFbReady(true);
      window.addEventListener("firebaseReady",h);
      return()=>window.removeEventListener("firebaseReady",h);
    }
  },[]);

  const friendly=(code)=>{
    if(code==="auth/user-not-found"||code==="auth/invalid-credential")return"Username or password is incorrect.";
    if(code==="auth/wrong-password")return"Wrong password.";
    if(code==="auth/email-already-in-use")return"That username is already taken.";
    if(code==="auth/weak-password")return"Password must be at least 6 characters.";
    if(code==="auth/too-many-requests")return"Too many attempts. Please wait a moment.";
    return"Something went wrong. Please try again.";
  };

  const handle=async(isRegister)=>{
    if(!username.trim()||!password.trim()){setError("Please enter a username and password.");return;}
    if(!fbReady){setError("Still connecting, please wait...");return;}
    setLoading(true);setError("");
    try{
      if(isRegister){const res=await window.__firebase.register(username,password);onLogin(res.uid,res.username,{});}
      else{const res=await window.__firebase.login(username,password);onLogin(res.uid,res.username,res.data);}
    }catch(e){setError(friendly(e.code));}
    setLoading(false);
  };

  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0f1e"}}>
    <div style={{background:"#0d1526",border:"1px solid #1e293b",borderRadius:16,padding:"40px 36px",width:"100%",maxWidth:380}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:40,marginBottom:10}}>📋</div>
        <div style={{fontSize:20,fontWeight:700,color:"#f1f5f9",fontFamily:"'IBM Plex Mono',monospace"}}>GCSE Revision Tracker</div>
        <div style={{fontSize:11,color:"#475569",marginTop:4,letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace"}}>Sign in or create an account</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div>
          <div style={{fontSize:11,color:"#64748b",marginBottom:5,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:1}}>Username</div>
          <input value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle(false)} placeholder="e.g. sid123" style={S.input} autoComplete="username"/>
        </div>
        <div>
          <div style={{fontSize:11,color:"#64748b",marginBottom:5,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:1}}>Password</div>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle(false)} placeholder="at least 6 characters" style={S.input} autoComplete="current-password"/>
        </div>
        {error&&<div style={{fontSize:12,color:"#f87171",background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:7,padding:"8px 12px",fontFamily:"monospace"}}>{error}</div>}
        <button onClick={()=>handle(false)} disabled={loading} style={{...S.btnBlue,opacity:loading?0.6:1,marginTop:4}}>{loading?"Loading...":"Log In"}</button>
        <button onClick={()=>handle(true)} disabled={loading} style={{background:"transparent",border:"1px solid #334155",borderRadius:8,color:"#94a3b8",padding:"11px",fontSize:14,fontFamily:"inherit",cursor:"pointer",opacity:loading?0.6:1}}>Register new account</button>
      </div>
      <div style={{fontSize:10,color:"#334155",textAlign:"center",marginTop:20,fontFamily:"monospace",lineHeight:1.6}}>Passwords are encrypted by Google · Choose any username</div>
    </div>
  </div>;
}

// ─── TIMETABLE ────────────────────────────────────────────────────────────────
function Timetable({timetable,setTimetable,tests,setTests,geminiKey,getProgress,subtopicData}){
  const [showSel,setShowSel]=useState(false);
  const [showAI,setShowAI]=useState(false);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiResult,setAiResult]=useState("");
  const [aiQ,setAiQ]=useState({hours:"2",priority:"",goal:""});
  const [newTest,setNewTest]=useState({subject:"",date:"",type:"Class test"});
  const [showAddTest,setShowAddTest]=useState(false);

  const setSlot=(day,slot,vals)=>setTimetable(p=>({...p,[`${day}__${slot}`]:vals}));
  const getSlot=(day,slot)=>{const v=timetable[`${day}__${slot}`];if(!v)return[];if(Array.isArray(v))return v;return v?[v]:[];};
  const counts={};
  Object.values(timetable).forEach(v=>{const arr=Array.isArray(v)?v:(v?[v]:[]);arr.forEach(id=>{if(id)counts[id]=(counts[id]||0)+1;});});

  const assignedSubjectIds=[...new Set(Object.values(counts).length>0?Object.keys(counts):[])];

  // Sort upcoming tests
  const today=new Date();today.setHours(0,0,0,0);
  const upcomingTests=(tests||[]).filter(t=>new Date(t.date)>=today).sort((a,b)=>new Date(a.date)-new Date(b.date));

  const daysUntil=(dateStr)=>{
    const d=new Date(dateStr);d.setHours(0,0,0,0);
    return Math.round((d-today)/(1000*60*60*24));
  };

  const addTest=()=>{
    if(!newTest.subject||!newTest.date)return;
    setTests(p=>[...(p||[]),{...newTest,id:Date.now().toString()}]);
    setNewTest({subject:"",date:"",type:"Class test"});
    setShowAddTest(false);
  };
  const removeTest=(id)=>setTests(p=>(p||[]).filter(t=>t.id!==id));

  const runAI=async()=>{
    if(!geminiKey){setAiResult("No Gemini API key set. Go to ⚙️ Settings to add one.");return;}
    setAiLoading(true);setAiResult("");
    const ragSummary=assignedSubjectIds.map(id=>{
      const s=ALL_SUBJECTS.find(x=>x.id===id);
      const subjectWithSpec=SUBJECTS.find(x=>x.id===id);
      if(!subjectWithSpec)return`${s?.name||id}: no spec data`;
      let total=0,green=0,amber=0,red=0;
      subjectWithSpec.topics.forEach(t=>t.subtopics.forEach((_,i)=>{
        total++;
        const key=`${id}__${t.id}__${i}`;
        const v=subtopicData[key]||{rag:"Red"};
        if(v.rag==="Green")green++;else if(v.rag==="Amber")amber++;else red++;
      }));
      return`${s?.name||id}: ${green}/${total} green, ${amber} amber, ${red} red`;
    }).join("\n");

    const testsList=upcomingTests.map(t=>`${t.subject} - ${t.type} in ${daysUntil(t.date)} days`).join("\n")||"No upcoming tests";
    const prompt=`You are a helpful GCSE revision assistant. A student wants help optimising their weekly revision timetable.

Their current spec coverage (RAG status):
${ragSummary}

Upcoming tests:
${testsList}

Student info:
- Available study hours per day: ${aiQ.hours}
- Priority concern: ${aiQ.priority||"none specified"}
- Main goal this week: ${aiQ.goal||"general revision"}

Days available: Mon-Sat (Sunday is a rest day)
Sessions per day: Daily habit (short), Evening 1, Evening 2

Please suggest an optimised weekly timetable for this student. For each day list which subject(s) to study in each session and briefly explain why. Keep it practical and encouraging. Format it clearly with each day on a new line.`;

    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
      });
      const data=await res.json();
      if(data.error){setAiResult("Error: "+data.error.message);}
      else{setAiResult(data.candidates?.[0]?.content?.parts?.[0]?.text||"No response received.");}
    }catch(e){setAiResult("Failed to connect to Gemini. Check your API key.");}
    setAiLoading(false);
  };

  return <div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
      <div style={S.sectionHeader}>Weekly Study Planner</div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>{if(window.confirm("Reset your entire timetable? This cannot be undone."))setTimetable({});}} style={{...S.btn,color:"#f87171",borderColor:"rgba(248,113,113,0.3)"}}>🗑 Reset</button>
        <button onClick={()=>setShowSel(p=>!p)} style={S.btn}>{showSel?"🙈 Hide selectors":"✏️ Edit timetable"}</button>
      </div>
    </div>
    <p style={{color:"#475569",fontSize:12,marginBottom:16,marginTop:4}}>Mon-Sat · Hold Ctrl (or Cmd on Mac) to select multiple subjects per cell.</p>

    {/* Timetable grid */}
    <div style={{marginBottom:20}}>
      <table style={S.table}><thead><tr>
        <th style={S.th}>Day</th>
        {SLOTS.map(slot=><th key={slot} style={S.th}>{slot}</th>)}
      </tr></thead><tbody>
        {DAYS.map(day=><tr key={day}>
          <td style={S.tdLabel}>{day}</td>
          {SLOTS.map(slot=>{
            const vals=getSlot(day,slot);
            const borderCol=vals.length===1?ALL_SUBJECTS.find(s=>s.id===vals[0])?.color:vals.length>1?"#94a3b8":undefined;
            return <td key={slot} style={{...S.td,verticalAlign:"top"}}>
              {showSel&&<select multiple value={vals} onChange={e=>{const sel=Array.from(e.target.selectedOptions).map(o=>o.value);setSlot(day,slot,sel);}}
                style={{...S.sel,height:"112px",width:"100%",fontSize:12,...(borderCol?{borderColor:borderCol}:{})}}>
                {ALL_SUBJECTS.map(s=>{const sel=vals.includes(s.id);return <option key={s.id} value={s.id} style={{color:sel?s.color:"#94a3b8",background:sel?s.color+"22":"#111827",fontWeight:sel?700:400,padding:"4px 6px"}}>{s.emoji} {s.name}</option>;})}
              </select>}
              {vals.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:showSel?6:0}}>
                {vals.map(id=>{const s=ALL_SUBJECTS.find(x=>x.id===id);return s?<span key={id} style={{fontSize:11,background:s.color+"22",color:s.color,borderRadius:5,padding:"2px 7px",border:`1px solid ${s.color}44`}}>{s.emoji} {s.name}</span>:null;})}
              </div>}
              {vals.length===0&&!showSel&&<span style={{color:"#334155",fontSize:11}}>—</span>}
            </td>;
          })}
        </tr>)}
      </tbody></table>
    </div>

    {/* Weekly focus */}
    <div style={{...S.card,marginBottom:20}}>
      <div style={S.cardTitle}>Current Focus</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:12}}>
        {ALL_SUBJECTS.filter(s=>(counts[s.id]||0)>0).map(s=>{const c=counts[s.id];return <div key={s.id} style={{display:"flex",alignItems:"center",gap:6,background:s.color+"15",border:`1px solid ${s.color}40`,borderRadius:8,padding:"4px 10px"}}>
          <span>{s.emoji}</span><span style={{color:"#e2e8f0",fontSize:13}}>{s.name}</span><span style={{color:s.color,fontWeight:700,fontSize:13}}>{c}x</span>
        </div>;})}
        {Object.keys(counts).length===0&&<span style={{color:"#334155",fontSize:12}}>No subjects assigned yet.</span>}
      </div>
    </div>

    {/* Upcoming tests */}
    <div style={{...S.card,marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={S.cardTitle}>Upcoming Tests & Exams</div>
        <button onClick={()=>setShowAddTest(p=>!p)} style={S.btn}>＋ Add test</button>
      </div>
      {showAddTest&&<div style={{background:"#0a0f1e",borderRadius:8,padding:12,marginBottom:12,display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{flex:2,minWidth:120}}>
          <div style={{fontSize:10,color:"#475569",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Subject</div>
          <select value={newTest.subject} onChange={e=>setNewTest(p=>({...p,subject:e.target.value}))} style={{...S.sel,height:"auto"}}>
            <option value="">Pick subject</option>
            {ALL_SUBJECTS.filter(s=>assignedSubjectIds.includes(s.id)||SUBJECTS.find(x=>x.id===s.id)).map(s=><option key={s.id} value={s.name}>{s.emoji} {s.name}</option>)}
          </select>
        </div>
        <div style={{flex:2,minWidth:120}}>
          <div style={{fontSize:10,color:"#475569",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Type</div>
          <select value={newTest.type} onChange={e=>setNewTest(p=>({...p,type:e.target.value}))} style={{...S.sel,height:"auto"}}>
            {["Class test","Mock exam","Full exam","Assessment","Other"].map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </div>
        <div style={{flex:2,minWidth:120}}>
          <div style={{fontSize:10,color:"#475569",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Date</div>
          <input type="date" value={newTest.date} onChange={e=>setNewTest(p=>({...p,date:e.target.value}))} style={{...S.specDate,width:"100%",padding:"7px 8px",fontSize:12}}/>
        </div>
        <button onClick={addTest} style={{...S.btnBlue,padding:"8px 14px",fontSize:12,flexShrink:0}}>Add</button>
      </div>}
      {upcomingTests.length===0&&!showAddTest&&<div style={{color:"#334155",fontSize:12}}>No upcoming tests added yet.</div>}
      <div style={{display:"grid",gap:8}}>
        {upcomingTests.map(t=>{
          const days=daysUntil(t.date);
          const urgency=days<=3?"#f87171":days<=7?"#fbbf24":"#4ade80";
          const subj=ALL_SUBJECTS.find(s=>s.name===t.subject);
          return <div key={t.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0b1120",borderRadius:8,padding:"10px 14px",border:`1px solid ${urgency}33`}}>

              <span style={{fontSize:18}}>{subj?.emoji||"📝"}</span>

                <div style={{color:"#f1f5f9",fontSize:13,fontWeight:600}}>{t.subject} — {t.type}</div>
                <div style={{color:"#475569",fontSize:11}}>{new Date(t.date).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}</div>

            <div style={{display:"flex",alignItems:"center",gap:10}}>

    </div>

    {/* AI Timetable Optimiser */}
    <div style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showAI?16:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16}}>🤖</span>
          <div style={S.cardTitle}>AI Timetable Optimiser</div>
          {!geminiKey&&<span style={{fontSize:10,color:"#475569",background:"#1e293b",borderRadius:4,padding:"2px 6px"}}>Needs API key</span>}
        </div>
        <button onClick={()=>setShowAI(p=>!p)} style={S.btn}>{showAI?"Hide":"Optimise my timetable ✨"}</button>
      </div>
      {showAI&&<div>
        <div style={{display:"grid",gap:12,marginBottom:16}}>

            <input value={aiQ.goal} onChange={e=>setAiQ(p=>({...p,goal:e.target.value}))} placeholder="e.g. Finish Biology topics, start past papers for Maths..." style={{...S.input,fontSize:12}}/>

// ─── AI STUDY COACH ───────────────────────────────────────────────────────────
function AICoach({geminiKey,timetable,subtopicData,grades,tests}){
  const [messages,setMessages]=useState([{role:"assistant",text:"Hi! I'm your AI study coach. Ask me anything — which topics to focus on, how to tackle a subject, exam tips, or anything else revision-related. I can see your RAG data and upcoming tests to give you personalised advice."}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);

  useEffect(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),[messages]);

  const buildContext=()=>{
    const ragSummary=SUBJECTS.map(s=>{
      let total=0,green=0,amber=0,red=0;
      s.topics.forEach(t=>t.subtopics.forEach((_,i)=>{
        total++;const v=subtopicData[`${s.id}__${t.id}__${i}`]||{rag:"Red"};
        if(v.rag==="Green")green++;else if(v.rag==="Amber")amber++;else red++;
      }));
      return`${s.name} (${s.board}): ${green}/${total} green, ${amber} amber, ${red} red`;
    }).join("\n");
    const today=new Date();today.setHours(0,0,0,0);
    const testsList=(tests||[]).filter(t=>new Date(t.date)>=today).sort((a,b)=>new Date(a.date)-new Date(b.date))
      .map(t=>{const days=Math.round((new Date(t.date)-today)/(1000*60*60*24));return`${t.subject} ${t.type} in ${days} days`;}).join(", ")||"none";
    return`Student spec coverage:\n${ragSummary}\n\nUpcoming tests: ${testsList}`;
  };

  const send=async()=>{
    if(!input.trim())return;
    if(!geminiKey){setMessages(p=>[...p,{role:"user",text:input},{role:"assistant",text:"No Gemini API key set. Go to ⚙️ Settings to add one."}]);setInput("");return;}
    const userMsg=input.trim();
    setMessages(p=>[...p,{role:"user",text:userMsg}]);
    setInput("");setLoading(true);
    const history=messages.map(m=>`${m.role==="user"?"Student":"Coach"}: ${m.text}`).join("\n");
    const prompt=`You are a friendly, encouraging GCSE revision coach. Keep responses concise and practical.

${buildContext()}

Conversation so far:
${history}
Student: ${userMsg}
Coach:`;
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
      });
      const data=await res.json();
      const reply=data.candidates?.[0]?.content?.parts?.[0]?.text||"Sorry, I couldn't get a response.";
      setMessages(p=>[...p,{role:"assistant",text:reply}]);
    }catch(e){setMessages(p=>[...p,{role:"assistant",text:"Failed to connect to Gemini. Check your API key."}]);}
    setLoading(false);
  };

  return <div>
    <div style={S.sectionHeader}>🤖 AI Study Coach</div>
    <p style={{color:"#475569",fontSize:12,marginBottom:16,marginTop:4}}>Ask me anything about your revision. I can see your RAG data and upcoming tests.{!geminiKey&&<span style={{color:"#f87171"}}> (Add a Gemini API key in ⚙️ Settings to use this)</span>}</p>
    <div style={{background:"#0d1526",border:"1px solid #1e293b",borderRadius:10,display:"flex",flexDirection:"column",height:480}}>
      <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12}}>
        {messages.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
          <div style={{maxWidth:"80%",background:m.role==="user"?"#1d4ed8":"#111827",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#e2e8f0",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{m.text}</div>
        </div>)}
        {loading&&<div style={{display:"flex",justifyContent:"flex-start"}}><div style={{background:"#111827",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#475569"}}>Thinking...</div></div>}
        <div ref={endRef}/>
      </div>
      <div style={{borderTop:"1px solid #1e293b",padding:12,display:"flex",gap:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!loading&&send()}
          placeholder="Ask anything about your revision..." style={{...S.input,fontSize:12,flex:1}}/>
        <button onClick={send} disabled={loading||!input.trim()} style={{...S.btnBlue,padding:"8px 16px",opacity:(loading||!input.trim())?0.5:1}}>Send</button>
      </div>
    </div>
  </div>;
}

// ─── GRADES ───────────────────────────────────────────────────────────────────
function Grades({grades,setGrades,getProgress,assignedSubjectIds}){
  const setGrade=(id,field,val)=>setGrades(p=>({...p,[id]:{...(p[id]||{}),[field]:val}}));
  const getGrade=id=>grades[id]||{target:"",mock:"",predicted:"",notes:""};

  const visibleSubjects=ALL_SUBJECTS.filter(s=>assignedSubjectIds.includes(s.id));
  const subjectsWithSpec=visibleSubjects.filter(s=>SUBJECTS.find(x=>x.id===s.id));
  const subjectsWithoutSpec=visibleSubjects.filter(s=>!SUBJECTS.find(x=>x.id===s.id));

  const GradeCard=({s,showProgress})=>{
    const g=getGrade(s.id);
    const prog=showProgress?getProgress(s.id):null;
    const gPct=prog?Math.round((prog.green/prog.total)*100):0;
    const aPct=prog?Math.round((prog.amber/prog.total)*100):0;
    return <div style={{...S.card,borderLeft:`3px solid ${s.color}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>{s.emoji}</span>
          <div>
            <div style={{fontWeight:700,color:"#f1f5f9",fontSize:15}}>{s.name}</div>
            <div style={{color:"#64748b",fontSize:12}}>{s.board||"—"}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {["target","mock","predicted"].map(field=><div key={field} style={{textAlign:"center"}}>
            <div style={{color:"#64748b",fontSize:11,marginBottom:3,textTransform:"uppercase",letterSpacing:1}}>{field}</div>
            <select value={g[field]} onChange={e=>setGrade(s.id,field,e.target.value)} style={{...S.gradeSel,color:s.color}}>
              <option value="">-</option>
              {["U","1","2","3","4","5","6","7","8","9"].map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>)}
        </div>
      </div>
      {showProgress&&prog&&<div style={{marginTop:14}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{color:"#94a3b8",fontSize:12}}>Spec coverage (RAG)</span>
          <span style={{color:"#94a3b8",fontSize:12}}>{prog.green}/{prog.total} green</span>
        </div>
        <div style={S.progressTrack}>
          <div style={{...S.progressBar,width:`${gPct}%`,background:"#4ade80"}}/>
          <div style={{...S.progressBar,width:`${aPct}%`,background:"#fbbf24",left:`${gPct}%`}}/>
        </div>
        <div style={{display:"flex",gap:12,marginTop:5}}>
          {[["🟢",prog.green,"#4ade80"],["🟡",prog.amber,"#fbbf24"],["🔴",prog.red,"#f87171"]].map(([icon,n,c])=><span key={icon} style={{fontSize:11,color:c}}>{icon} {n}</span>)}
        </div>
      </div>}
      <textarea placeholder="Notes..." value={g.notes} onChange={e=>setGrade(s.id,"notes",e.target.value)} style={S.notesArea} rows={2}/>
    </div>;
  };

  return <div>
    <div style={S.sectionHeader}>Grade Tracker</div>
    <p style={{color:"#475569",fontSize:12,marginBottom:20,marginTop:4}}>Only subjects assigned in your timetable appear here.</p>
    {visibleSubjects.length===0&&<div style={{...S.card,color:"#475569",fontSize:13}}>No subjects assigned yet — go to the Timetable tab and add subjects to your sessions.</div>}
    {subjectsWithSpec.length>0&&<div style={{display:"grid",gap:16,marginBottom:16}}>
      {subjectsWithSpec.map(s=><GradeCard key={s.id} s={s} showProgress={true}/>)}
    </div>}
    {subjectsWithoutSpec.length>0&&<div>
      <div style={{fontSize:12,color:"#475569",marginBottom:12,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Subjects without spec data</div>
      <div style={{display:"grid",gap:16}}>
        {subjectsWithoutSpec.map(s=><GradeCard key={s.id} s={s} showProgress={false}/>)}
      </div>
    </div>}
  </div>;
}

// ─── SPEC TRACKER ─────────────────────────────────────────────────────────────
function SpecTracker({expSubj,setExpSubj,expTopic,setExpTopic,getVal,setVal,getProgress,assignedSubjectIds,user,specRequests,setSpecRequests}){
  const toggleTopic=id=>setExpTopic(p=>({...p,[id]:!p[id]}));
  const [reqBoard,setReqBoard]=useState({});
  const [confirming,setConfirming]=useState(null); // subjectId being confirmed

  const visibleSubjects=ALL_SUBJECTS.filter(s=>assignedSubjectIds.includes(s.id));
  const subjectsWithSpec=visibleSubjects.filter(s=>SUBJECTS.find(x=>x.id===s.id));
  const subjectsWithoutSpec=visibleSubjects.filter(s=>!SUBJECTS.find(x=>x.id===s.id));

  const alreadySent=(sId)=>(specRequests||[]).includes(sId);

  const [reqLoading,setReqLoading]=useState(false);

  const confirmRequest=(s)=>{
    if(!reqBoard[s.id]?.trim())return;
    setConfirming(s);
  };

  const sendRequest=async()=>{
    const s=confirming;if(!s)return;
    setReqLoading(true);
    try{
      await window.__firebase.sendSpecRequest(user.username,s.id,s.name,reqBoard[s.id]);
      setSpecRequests([...(specRequests||[]),s.id]);
    }catch(e){console.error(e);}
    setReqLoading(false);
    setConfirming(null);
  };

  return <div>
    {confirming&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#0d1526",border:"1px solid #1e293b",borderRadius:16,padding:"28px",width:"100%",maxWidth:420}}>
        <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9",marginBottom:12}}>📨 Confirm spec request</div>
        <div style={{fontSize:13,color:"#94a3b8",marginBottom:6}}>You're requesting the spec for:</div>
        <div style={{background:"#0b1120",borderRadius:8,padding:"10px 14px",marginBottom:6}}>
          <div style={{fontWeight:700,color:"#f1f5f9"}}>{confirming.emoji} {confirming.name}</div>
          <div style={{color:"#64748b",fontSize:12,marginTop:2}}>Exam board: <span style={{color:"#e2e8f0"}}>{reqBoard[confirming.id]}</span></div>
        </div>
        <div style={{fontSize:11,color:"#475569",marginBottom:16,lineHeight:1.5}}>This sends a request to the site owner. You can only send one request per subject. The spec will be added to the tracker once it's ready.</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={sendRequest} disabled={reqLoading} style={{...S.btnGreen,flex:1,textAlign:"center",opacity:reqLoading?0.6:1}}>{reqLoading?"Sending...":"✓ Yes, send request"}</button>
          <button onClick={()=>setConfirming(null)} style={{...S.btn,flex:1,textAlign:"center"}}>Cancel</button>
        </div>
      </div>
    </div>}
    <div style={S.sectionHeader}>Spec Tracker</div>
    <p style={{color:"#475569",fontSize:12,marginBottom:20,marginTop:4}}>Only subjects assigned in your timetable appear here.</p>
    {visibleSubjects.length===0&&<div style={{...S.card,color:"#475569",fontSize:13}}>No subjects assigned yet — go to the Timetable tab first.</div>}

    {subjectsWithSpec.length>0&&<div style={{display:"grid",gap:12,marginBottom:20}}>
      {subjectsWithSpec.map(s=>{
        const prog=getProgress(s.id);const gPct=Math.round((prog.green/prog.total)*100);const open=expSubj===s.id;
        return <div key={s.id} style={{...S.card,borderLeft:`3px solid ${s.color}`}}>
          <button style={S.subjBtn} onClick={()=>setExpSubj(open?null:s.id)}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>{s.emoji}</span>
              <div style={{textAlign:"left"}}>
                <div style={{fontWeight:700,color:"#f1f5f9",fontSize:14}}>{s.name}</div>
                <div style={{color:"#64748b",fontSize:11}}>{s.board} · {prog.total} subtopics</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{textAlign:"right"}}>
                <div style={{color:s.color,fontWeight:700,fontSize:15}}>{gPct}%</div>
                <div style={{color:"#475569",fontSize:11}}>green</div>
              </div>
              <MiniProgress prog={prog}/>
              <span style={{color:"#475569",fontSize:18}}>{open?"▲":"▼"}</span>
            </div>
          </button>
          {open&&<div style={{marginTop:12}}>
            {s.topics.map(t=>{
              const tOpen=expTopic[t.id];
              const tGreen=t.subtopics.filter((_,i)=>getVal(s.id,t.id,i).rag==="Green").length;
              return <div key={t.id} style={S.topicBlock}>
                <button style={S.topicBtn} onClick={()=>toggleTopic(t.id)}>
                  <span style={{color:"#cbd5e1",fontWeight:600,fontSize:13}}>{t.name}</span>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:11,color:"#4ade80"}}>✓ {tGreen}/{t.subtopics.length}</span>
                    <span style={{color:"#475569",fontSize:14}}>{tOpen?"▲":"▼"}</span>
                  </div>
                </button>
                {tOpen&&<div style={{marginTop:8}}>
                  <div style={S.specHeader}>
                    <span style={{flex:3}}>Subtopic</span><span style={{flex:2}}>Coverage</span>
                    <span style={{flex:1,textAlign:"center"}}>RAG</span><span style={{flex:2}}>Last revised</span>
                  </div>
                  {t.subtopics.map((st,i)=>{
                    const v=getVal(s.id,t.id,i);
                    return <div key={i} style={{...S.specRow,background:RAG_BG[v.rag]||"transparent"}}>
                      <span style={{flex:3,color:"#cbd5e1",fontSize:12,paddingRight:8}}>{st}</span>
                      <select value={v.coverage} onChange={e=>setVal(s.id,t.id,i,"coverage",e.target.value)} style={{...S.specSel,flex:2}}>
                        {COVERAGE_OPTIONS.map(o=><option key={o} value={o}>{o}</option>)}
                      </select>
                      <div style={{flex:1,display:"flex",justifyContent:"center",gap:4}}>
                        {RAG_OPTIONS.map(r=><button key={r} title={r} onClick={()=>setVal(s.id,t.id,i,"rag",r)} style={{
                          width:14,height:14,borderRadius:"50%",background:RAG_COLORS[r],
                          border:v.rag===r?"2px solid white":"2px solid transparent",
                          cursor:"pointer",padding:0,flexShrink:0,
                          boxShadow:v.rag===r?`0 0 6px ${RAG_COLORS[r]}`:"none"
                        }}/>)}
                      </div>
                      <input type="date" value={v.date} onChange={e=>setVal(s.id,t.id,i,"date",e.target.value)} style={{...S.specDate,flex:2}}/>
                    </div>;
                  })}
                </div>}
              </div>;
            })}
          </div>}
        </div>;
      })}
    </div>}

    {subjectsWithoutSpec.length>0&&<div>
      <div style={{fontSize:12,color:"#475569",marginBottom:12,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Subjects without spec data</div>
      <div style={{display:"grid",gap:12}}>
        {subjectsWithoutSpec.map(s=><div key={s.id} style={{...S.card,borderLeft:`3px solid ${s.color}`}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <span style={{fontSize:20}}>{s.emoji}</span>
            <div style={{fontWeight:700,color:"#f1f5f9",fontSize:14}}>{s.name}</div>
          </div>
          <div style={{background:"#0b1120",borderRadius:8,padding:14,border:"1px solid #1e293b"}}>
            <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>No exam board spec found for this subject yet.</div>
            {alreadySent(s.id)?<div style={{fontSize:12,color:"#4ade80"}}>✓ Spec request already sent! It will be added soon.</div>:<div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <input value={reqBoard[s.id]||""} onChange={e=>setReqBoard(p=>({...p,[s.id]:e.target.value}))}
                placeholder="Enter your exam board (e.g. AQA, Edexcel, OCR...)" style={{...S.input,fontSize:12,flex:1,minWidth:200}}/>
              <button onClick={()=>confirmRequest(s)} disabled={!reqBoard[s.id]?.trim()} style={{...S.btnGreen,fontSize:12,flexShrink:0,opacity:reqBoard[s.id]?.trim()?1:0.4}}>📨 Request spec</button>
            </div>}
          </div>
        </div>)}
      </div>
    </div>}
  </div>;
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState("timetable");
  const [timetable,setTimetableRaw]=useState({});
  const [subtopicData,setSubtopicDataRaw]=useState({});
  const [grades,setGradesRaw]=useState({});
  const [tests,setTestsRaw]=useState([]);
  const [geminiKey,setGeminiKeyRaw]=useState("");
  const [specRequests,setSpecRequestsRaw]=useState([]);
  const [expSubj,setExpSubj]=useState(null);
  const [expTopic,setExpTopic]=useState({});
  const [saving,setSaving]=useState(false);
  const [checking,setChecking]=useState(true);
  const [showSettings,setShowSettings]=useState(false);
  const saveTimer=useRef(null);

  useEffect(()=>{
    const tryRestore=()=>{
      if(!window.__firebase){window.addEventListener("firebaseReady",tryRestore,{once:true});return;}
      const unsub=window.__firebase.onAuthChange(async(fbUser)=>{
        if(fbUser){
          try{
            const snap=await window.__firebase.loadDoc(fbUser.uid);
            if(snap){
              setTimetableRaw(snap.timetable||{});setSubtopicDataRaw(snap.spec||{});
              setGradesRaw(snap.grades||{});setTestsRaw(snap.tests||[]);setGeminiKeyRaw(snap.geminiKey||"");setSpecRequestsRaw(snap.specRequests||[]);
              setUser({uid:fbUser.uid,username:snap.username||fbUser.email.replace("@gcsetracker.app","")});
            }
          }catch(e){console.error(e);}
        }
        setChecking(false);
      });
      return unsub;
    };
    const unsub=tryRestore();
    return()=>{if(typeof unsub==="function")unsub();};
  },[]);

  const saveToFirebase=useCallback(async(uid,tt,spec,gr,ts,gk,sr)=>{
    if(!uid||!window.__firebase)return;
    setSaving(true);
    await window.__firebase.saveData(uid,{timetable:tt,spec,grades:gr,tests:ts,geminiKey:gk,specRequests:sr});
    setSaving(false);
  },[]);

  const debouncedSave=useCallback((uid,tt,spec,gr,ts,gk,sr)=>{
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>saveToFirebase(uid,tt,spec,gr,ts,gk,sr),1500);
  },[saveToFirebase]);

  const setTimetable=v=>{const next=typeof v==="function"?v(timetable):v;setTimetableRaw(next);if(user)debouncedSave(user.uid,next,subtopicData,grades,tests,geminiKey,specRequests);};
  const setSubtopicData=v=>{const next=typeof v==="function"?v(subtopicData):v;setSubtopicDataRaw(next);if(user)debouncedSave(user.uid,timetable,next,grades,tests,geminiKey,specRequests);};
  const setGrades=v=>{const next=typeof v==="function"?v(grades):v;setGradesRaw(next);if(user)debouncedSave(user.uid,timetable,subtopicData,next,tests,geminiKey,specRequests);};
  const setTests=v=>{const next=typeof v==="function"?v(tests):v;setTestsRaw(next);if(user)debouncedSave(user.uid,timetable,subtopicData,grades,next,geminiKey,specRequests);};
  const setGeminiKey=v=>{setGeminiKeyRaw(v);if(user)debouncedSave(user.uid,timetable,subtopicData,grades,tests,v,specRequests);};
  const setSpecRequests=v=>{const next=typeof v==="function"?v(specRequests):v;setSpecRequestsRaw(next);if(user)debouncedSave(user.uid,timetable,subtopicData,grades,tests,geminiKey,next);};

  const handleLogin=(uid,username,data)=>{
    setTimetableRaw(data.timetable||{});setSubtopicDataRaw(data.spec||{});
    setGradesRaw(data.grades||{});setTestsRaw(data.tests||[]);setGeminiKeyRaw(data.geminiKey||"");setSpecRequestsRaw(data.specRequests||[]);
    setUser({uid,username});
  };
  const handleLogout=async()=>{
    await window.__firebase.logout();
    setUser(null);setTimetableRaw({});setSubtopicDataRaw({});setGradesRaw({});setTestsRaw([]);setGeminiKeyRaw("");setSpecRequestsRaw([]);
  };

  const getVal=(sId,tId,i)=>subtopicData[`${sId}__${tId}__${i}`]||{coverage:"Not started",rag:"Red",date:""};
  const setVal=(sId,tId,i,field,value)=>{const k=`${sId}__${tId}__${i}`;setSubtopicData(p=>({...p,[k]:{...getVal(sId,tId,i),[field]:value}}));};
  const getProgress=(sId)=>{
    const subj=SUBJECTS.find(s=>s.id===sId);if(!subj)return{total:1,green:0,amber:0,red:1};
    let total=0,green=0,amber=0;
    subj.topics.forEach(t=>t.subtopics.forEach((_,i)=>{total++;const v=getVal(sId,t.id,i);if(v.rag==="Green")green++;else if(v.rag==="Amber")amber++;}));
    return{total,green,amber,red:total-green-amber};
  };

  // Work out which subjects are assigned in the timetable
  const assignedSubjectIds=[...new Set(Object.values(timetable).flatMap(v=>Array.isArray(v)?v:(v?[v]:[])).filter(Boolean))];

  if(checking)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0f1e",color:"#475569",fontFamily:"monospace",fontSize:13}}>Connecting...</div>;
  if(!user)return <LoginScreen onLogin={handleLogin}/>;

  return <div style={S.root}>
    {showSettings&&<Settings geminiKey={geminiKey} setGeminiKey={setGeminiKey} onSave={k=>setGeminiKey(k)} onClose={()=>setShowSettings(false)}/>}
    <div style={S.header}>
      <div style={S.headerInner}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:32}}>📋</span>
          <div style={S.title}>GCSE Revision Tracker</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:11,color:saving?"#64748b":"#334155",fontFamily:"monospace",minWidth:60}}>{saving?"Saving...":"Saved ✓"}</span>
          {geminiKey&&<span style={{fontSize:11,color:"#4ade80",background:"rgba(74,222,128,0.1)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:4,padding:"2px 7px"}}>🤖 AI on</span>}
          <button onClick={()=>setShowSettings(true)} style={S.btn}>🤖 AI Setup</button>
          <span style={{fontSize:12,color:"#475569",fontFamily:"monospace"}}>👤 {user.username}</span>
          <button onClick={handleLogout} style={{...S.btn,color:"#64748b"}}>Log out</button>
        </div>
      </div>
      <div style={S.tabBar}>
        {[["timetable","📅 Timetable"],["grades","📊 Grades"],["spec","📖 Spec Tracker"],["ai","🤖 AI Coach"]].map(([id,label])=>
          <button key={id} style={{...S.tabBtn,...(tab===id?S.tabActive:{})}} onClick={()=>setTab(id)}>{label}</button>
        )}
      </div>
    </div>
    <div style={S.body}>
      {tab==="timetable"&&<Timetable timetable={timetable} setTimetable={setTimetable} tests={tests} setTests={setTests} geminiKey={geminiKey} getProgress={getProgress} subtopicData={subtopicData}/>}
      {tab==="grades"&&<Grades grades={grades} setGrades={setGrades} getProgress={getProgress} assignedSubjectIds={assignedSubjectIds}/>}
      {tab==="spec"&&<SpecTracker expSubj={expSubj} setExpSubj={setExpSubj} expTopic={expTopic} setExpTopic={setExpTopic} getVal={getVal} setVal={setVal} getProgress={getProgress} assignedSubjectIds={assignedSubjectIds} user={user} specRequests={specRequests} setSpecRequests={setSpecRequests}/>}
      {tab==="ai"&&<AICoach geminiKey={geminiKey} timetable={timetable} subtopicData={subtopicData} grades={grades} tests={tests}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
